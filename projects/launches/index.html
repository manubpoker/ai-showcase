<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Launch Countdown</title>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-5HPMN4CHL3"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-5HPMN4CHL3');</script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#07080e;--card:#0d1017;--border:#161d2e;--text:#e2e8f0;--muted:#64748b;--accent:#f97316;--accent2:#fb923c;--go:#22c55e;--tbd:#eab308;--fail:#ef4444;--info:#3b82f6}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

.header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--border);background:rgba(13,16,23,0.95);backdrop-filter:blur(12px);position:sticky;top:0;z-index:200}
.header h1{font-size:1.05rem;font-weight:700}
.header h1 span{background:linear-gradient(135deg,#f97316,#ef4444,#eab308);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .sub{font-size:0.62rem;color:var(--muted);margin-top:1px}
.rocket-icon{margin-right:6px;font-size:1rem}
.update-info{font-size:0.65rem;color:var(--muted)}

/* Hero countdown */
.hero{background:linear-gradient(180deg,rgba(249,115,22,0.06) 0%,var(--bg) 100%);border-bottom:1px solid var(--border);padding:28px 20px 24px;text-align:center}
.hero-label{font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px}
.hero-name{font-size:1.4rem;font-weight:800;margin-bottom:4px}
.hero-provider{font-size:0.78rem;color:var(--accent2);margin-bottom:14px}
.countdown{display:flex;justify-content:center;gap:10px}
.cd-unit{text-align:center}
.cd-num{font-size:2.4rem;font-weight:800;font-variant-numeric:tabular-nums;line-height:1;color:var(--accent);text-shadow:0 0 20px rgba(249,115,22,0.3)}
.cd-label{font-size:0.55rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-top:4px}
.hero-status{display:inline-block;margin-top:14px;padding:4px 14px;border-radius:14px;font-size:0.68rem;font-weight:600}
.hero-mission{font-size:0.72rem;color:var(--muted);margin-top:10px;max-width:600px;margin-left:auto;margin-right:auto;line-height:1.5}

/* Layout */
.layout{display:grid;grid-template-columns:1fr 380px;min-height:calc(100vh - 250px)}

/* Map */
.map-section{position:relative;border-right:1px solid var(--border);min-height:400px}
#map{width:100%;height:100%}
.map-overlay{position:absolute;top:12px;left:12px;z-index:500;background:rgba(13,16,23,0.9);border:1px solid var(--border);border-radius:8px;padding:8px 12px;backdrop-filter:blur(8px)}
.map-overlay h3{font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:4px}
.site-name{font-size:0.78rem;font-weight:600}
.site-loc{font-size:0.62rem;color:var(--muted)}

/* Launch list */
.sidebar{overflow-y:auto;background:var(--card)}
.sidebar-header{padding:12px 16px;border-bottom:1px solid var(--border);font-size:0.78rem;font-weight:600;display:flex;align-items:center;justify-content:space-between}
.sidebar-header .count{font-size:0.62rem;color:var(--muted);font-weight:400}

.launch-card{padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s}
.launch-card:hover{background:rgba(249,115,22,0.04)}
.launch-card.active{background:rgba(249,115,22,0.06);border-left:3px solid var(--accent)}
.lc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px}
.lc-name{font-size:0.82rem;font-weight:600;flex:1;margin-right:8px}
.lc-badge{font-size:0.55rem;padding:2px 8px;border-radius:10px;font-weight:600;white-space:nowrap;flex-shrink:0}
.lc-provider{font-size:0.68rem;color:var(--accent2);margin-bottom:4px}
.lc-mission{font-size:0.65rem;color:var(--muted);margin-bottom:6px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.lc-meta{display:flex;gap:12px;font-size:0.62rem;color:var(--muted)}
.lc-meta span{display:flex;align-items:center;gap:3px}
.lc-countdown{font-size:0.75rem;font-weight:700;font-variant-numeric:tabular-nums;margin-top:6px}
.lc-countdown.soon{color:var(--accent)}
.lc-countdown.far{color:var(--muted)}

/* Tabs */
.tabs{display:flex;border-bottom:1px solid var(--border)}
.tab{flex:1;padding:8px;text-align:center;font-size:0.68rem;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

.loading{padding:40px;text-align:center;color:var(--muted);font-size:0.78rem}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:800px){
  .layout{grid-template-columns:1fr;grid-template-rows:300px auto}
  .map-section{border-right:none;min-height:250px}
  .countdown .cd-num{font-size:1.8rem}
  .hero-name{font-size:1.1rem}
}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1><span class="rocket-icon">🚀</span><span>Launch Countdown</span></h1>
    <div class="sub">Live rocket launch tracker · The Space Devs API</div>
  </div>
  <div class="update-info" id="updateInfo">Loading...</div>
</div>

<!-- Hero countdown for next launch -->
<div class="hero" id="hero">
  <div class="hero-label">Next Launch</div>
  <div class="hero-name" id="heroName">Loading...</div>
  <div class="hero-provider" id="heroProvider">—</div>
  <div class="countdown" id="countdown">
    <div class="cd-unit"><div class="cd-num" id="cdDays">--</div><div class="cd-label">Days</div></div>
    <div class="cd-unit"><div class="cd-num" id="cdHours">--</div><div class="cd-label">Hours</div></div>
    <div class="cd-unit"><div class="cd-num" id="cdMins">--</div><div class="cd-label">Min</div></div>
    <div class="cd-unit"><div class="cd-num" id="cdSecs">--</div><div class="cd-label">Sec</div></div>
  </div>
  <div class="hero-status" id="heroStatus">—</div>
  <div class="hero-mission" id="heroMission"></div>
</div>

<div class="layout">
  <div class="map-section">
    <div id="map"></div>
    <div class="map-overlay" id="mapOverlay" style="display:none">
      <h3>Launch Site</h3>
      <div class="site-name" id="siteName">—</div>
      <div class="site-loc" id="siteLoc">—</div>
    </div>
  </div>

  <div class="sidebar">
    <div class="tabs" id="tabs">
      <div class="tab active" data-tab="upcoming">Upcoming</div>
      <div class="tab" data-tab="previous">Recent</div>
    </div>
    <div class="sidebar-header">
      <span id="listTitle">Upcoming Launches</span>
      <span class="count" id="listCount">—</span>
    </div>
    <div id="launchList">
      <div class="loading"><span class="spinner"></span>Loading launches...</div>
    </div>
  </div>
</div>

<script>
const API = 'https://ll.thespacedevs.com/2.2.0';
let upcomingLaunches = [];
let previousLaunches = [];
let activeLaunch = null;
let activeTab = 'upcoming';
let map, markers = [];

// Status colors
function statusStyle(id) {
  // LL2 status IDs: 1=Go, 2=TBD, 3=Success, 4=Failure, 5=Hold, 6=InFlight, 7=Partial
  switch(id) {
    case 1: case 3: return { bg:'rgba(34,197,94,0.12)', color:'#22c55e' };
    case 2: case 5: return { bg:'rgba(234,179,8,0.12)', color:'#eab308' };
    case 4: case 7: return { bg:'rgba(239,68,68,0.12)', color:'#ef4444' };
    case 6: return { bg:'rgba(59,130,246,0.12)', color:'#3b82f6' };
    default: return { bg:'rgba(100,116,139,0.12)', color:'#64748b' };
  }
}

// Format countdown string
function fmtCountdown(ms) {
  if (ms <= 0) return { text: 'LAUNCHED', soon: false };
  const d = Math.floor(ms / 86400000);
  const h = Math.floor((ms % 86400000) / 3600000);
  const m = Math.floor((ms % 3600000) / 60000);
  const s = Math.floor((ms % 60000) / 1000);
  if (d > 0) return { text: `T-${d}d ${h}h ${m}m`, soon: d < 3 };
  if (h > 0) return { text: `T-${h}h ${m}m ${s}s`, soon: true };
  return { text: `T-${m}m ${s}s`, soon: true };
}

// Init map
function initMap() {
  map = L.map('map', { zoomControl: false }).setView([28.5, -80.6], 3);
  L.control.zoom({ position: 'topright' }).addTo(map);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; CARTO', maxZoom: 18
  }).addTo(map);
}

function updateMapMarkers(launches) {
  markers.forEach(m => map.removeLayer(m));
  markers = [];

  const sites = {};
  launches.forEach(l => {
    const pad = l.pad;
    if (!pad || !pad.latitude || !pad.longitude) return;
    const key = `${pad.latitude},${pad.longitude}`;
    if (!sites[key]) sites[key] = { lat: parseFloat(pad.latitude), lon: parseFloat(pad.longitude), name: pad.location?.name || pad.name, launches: [] };
    sites[key].launches.push(l);
  });

  Object.values(sites).forEach(site => {
    const count = site.launches.length;
    const isActive = activeLaunch && site.launches.some(l => l.id === activeLaunch.id);
    const size = isActive ? 18 : Math.max(12, Math.min(22, 10 + count * 3));
    const color = isActive ? '#f97316' : '#fb923c';

    const icon = L.divIcon({
      className: '',
      html: `<div style="
        width:${size}px;height:${size}px;border-radius:50%;
        background:${color}33;border:2px solid ${color};
        box-shadow:0 0 ${isActive?16:8}px ${color}44;
        display:flex;align-items:center;justify-content:center;
        font-size:${size<16?7:9}px;font-weight:700;color:${color};
        font-family:Inter,system-ui;
      ">${count > 1 ? count : ''}</div>`,
      iconSize: [size, size], iconAnchor: [size/2, size/2]
    });

    const m = L.marker([site.lat, site.lon], { icon })
      .addTo(map)
      .bindTooltip(`${site.name} (${count} launch${count>1?'es':''})`, { direction:'top', offset:[0,-size/2] });
    m.on('click', () => {
      if (site.launches.length > 0) selectLaunch(site.launches[0]);
    });
    markers.push(m);
  });
}

// Fetch launches
async function fetchUpcoming() {
  const res = await fetch(`${API}/launch/upcoming/?limit=25&mode=detailed`);
  const data = await res.json();
  return data.results || [];
}

async function fetchPrevious() {
  const res = await fetch(`${API}/launch/previous/?limit=20&mode=detailed&ordering=-net`);
  const data = await res.json();
  return data.results || [];
}

// Render
function renderHero(launch) {
  if (!launch) return;
  document.getElementById('heroName').textContent = launch.name || 'Unknown';
  document.getElementById('heroProvider').textContent = launch.launch_service_provider?.name || '—';

  const st = launch.status;
  const style = statusStyle(st?.id);
  const badge = document.getElementById('heroStatus');
  badge.textContent = st?.name || 'Unknown';
  badge.style.background = style.bg;
  badge.style.color = style.color;

  const mission = launch.mission;
  document.getElementById('heroMission').textContent = mission?.description
    ? mission.description.substring(0, 200) + (mission.description.length > 200 ? '...' : '')
    : '';
}

function updateHeroCountdown() {
  if (!activeLaunch || !activeLaunch.net) return;
  const ms = new Date(activeLaunch.net).getTime() - Date.now();
  if (ms <= 0) {
    document.getElementById('cdDays').textContent = '00';
    document.getElementById('cdHours').textContent = '00';
    document.getElementById('cdMins').textContent = '00';
    document.getElementById('cdSecs').textContent = '00';
    return;
  }
  const d = Math.floor(ms / 86400000);
  const h = Math.floor((ms % 86400000) / 3600000);
  const m = Math.floor((ms % 3600000) / 60000);
  const s = Math.floor((ms % 60000) / 1000);
  document.getElementById('cdDays').textContent = String(d).padStart(2, '0');
  document.getElementById('cdHours').textContent = String(h).padStart(2, '0');
  document.getElementById('cdMins').textContent = String(m).padStart(2, '0');
  document.getElementById('cdSecs').textContent = String(s).padStart(2, '0');
}

function renderLaunchList(launches) {
  const list = document.getElementById('launchList');
  const isUpcoming = activeTab === 'upcoming';
  document.getElementById('listTitle').textContent = isUpcoming ? 'Upcoming Launches' : 'Recent Launches';
  document.getElementById('listCount').textContent = `${launches.length} launches`;

  if (launches.length === 0) {
    list.innerHTML = '<div class="loading">No launches found</div>';
    return;
  }

  list.innerHTML = launches.map((l, i) => {
    const st = l.status;
    const style = statusStyle(st?.id);
    const net = l.net ? new Date(l.net) : null;
    const ms = net ? net.getTime() - Date.now() : 0;
    const cd = isUpcoming ? fmtCountdown(ms) : null;
    const timeStr = net ? net.toLocaleDateString([], { month:'short', day:'numeric', year:'numeric' }) + ' ' +
      net.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }) : 'TBD';
    const isActive = activeLaunch && activeLaunch.id === l.id;
    const pad = l.pad;
    const orbit = l.mission?.orbit?.name;

    return `<div class="launch-card${isActive?' active':''}" data-idx="${i}">
      <div class="lc-top">
        <div class="lc-name">${esc(l.name || 'Unknown')}</div>
        <span class="lc-badge" style="background:${style.bg};color:${style.color}">${st?.abbrev || '?'}</span>
      </div>
      <div class="lc-provider">${esc(l.launch_service_provider?.name || '—')}</div>
      ${l.mission?.description ? `<div class="lc-mission">${esc(l.mission.description.substring(0, 120))}</div>` : ''}
      <div class="lc-meta">
        <span>📅 ${timeStr}</span>
        ${pad ? `<span>📍 ${esc(pad.location?.name?.split(',')[0] || pad.name || '')}</span>` : ''}
        ${orbit ? `<span>🌍 ${esc(orbit)}</span>` : ''}
      </div>
      ${cd ? `<div class="lc-countdown ${cd.soon?'soon':'far'}">${cd.text}</div>` : ''}
    </div>`;
  }).join('');

  list.querySelectorAll('.launch-card').forEach(el => {
    el.onclick = () => {
      const idx = parseInt(el.dataset.idx);
      selectLaunch(launches[idx]);
    };
  });
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function selectLaunch(launch) {
  activeLaunch = launch;
  renderHero(launch);
  updateHeroCountdown();
  renderLaunchList(activeTab === 'upcoming' ? upcomingLaunches : previousLaunches);
  updateMapMarkers(activeTab === 'upcoming' ? upcomingLaunches : previousLaunches);

  // Fly to pad
  const pad = launch.pad;
  if (pad && pad.latitude && pad.longitude) {
    map.flyTo([parseFloat(pad.latitude), parseFloat(pad.longitude)], 6, { duration: 1.2 });
    const overlay = document.getElementById('mapOverlay');
    overlay.style.display = '';
    document.getElementById('siteName').textContent = pad.name || '—';
    document.getElementById('siteLoc').textContent = pad.location?.name || `${pad.latitude}, ${pad.longitude}`;
  }
}

// Tabs
document.querySelectorAll('.tab').forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    activeTab = tab.dataset.tab;
    const launches = activeTab === 'upcoming' ? upcomingLaunches : previousLaunches;
    renderLaunchList(launches);
    updateMapMarkers(launches);
    if (launches.length > 0 && (!activeLaunch || !launches.find(l => l.id === activeLaunch.id))) {
      selectLaunch(launches[0]);
    }
  };
});

// Init
async function init() {
  initMap();

  try {
    const [up, prev] = await Promise.all([
      fetchUpcoming().catch(() => []),
      fetchPrevious().catch(() => [])
    ]);

    upcomingLaunches = up;
    previousLaunches = prev;

    renderLaunchList(upcomingLaunches);
    updateMapMarkers(upcomingLaunches);

    if (upcomingLaunches.length > 0) {
      selectLaunch(upcomingLaunches[0]);
    }

    document.getElementById('updateInfo').textContent = `Updated ${new Date().toLocaleTimeString()} · ${upcomingLaunches.length} upcoming`;
  } catch(e) {
    console.error(e);
    document.getElementById('updateInfo').textContent = 'Error loading data';
    document.getElementById('launchList').innerHTML = '<div class="loading">Failed to load launches. The API may be rate-limited — try again in a minute.</div>';
  }
}

init();

// Countdown tick
setInterval(updateHeroCountdown, 1000);

// Update countdowns in list every 30s
setInterval(() => {
  if (activeTab === 'upcoming') renderLaunchList(upcomingLaunches);
}, 30000);

// Refresh data every 10 minutes
setInterval(init, 600000);
</script>
</body>
</html>
