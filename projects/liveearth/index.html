<!DOCTYPE html>
<html lang="en">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-5HPMN4CHL3"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-5HPMN4CHL3');</script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Earth</title>
  <link rel="icon" type="image/svg+xml" href="../shared/favicon.svg" />
  <link rel="stylesheet" href="./styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/globe.gl@2.41.3/dist/globe.gl.min.js"></script>
</head>
<body>
  <div id="loading-screen">
    <div>
      <div class="loading-spinner">🌍</div>
      <h1>Loading Live Earth...</h1>
      <p>Preparing globe and data layers</p>
    </div>
  </div>

  <button id="menu-btn" aria-label="Toggle menu">☰</button>
  <div id="layer-panel"></div>
  <div id="globe-container"></div>

  <div id="hover-card">
    <h3 id="hover-name"></h3>
    <div class="hover-value" id="hover-value"></div>
    <div class="hover-meta" id="hover-meta"></div>
  </div>

  <div id="legend-bar">
    <div class="legend-header">
      <span id="legend-title"></span>
      <span id="legend-unit"></span>
    </div>
    <div class="legend-gradient" id="legend-gradient"></div>
    <div class="legend-range">
      <span id="legend-min"></span>
      <span id="legend-max"></span>
    </div>
  </div>

  <div class="layer-badge" id="layer-badge">0 layers</div>
  <div id="live-kpi-bar" aria-live="polite"></div>
  <div id="empty-hint"><span>Enable a layer to explore</span></div>
  <div id="radio-player" aria-live="polite"></div>
  <div id="country-sheet"></div>

  <script type="module" src="./app.js"></script>
</body>
</html>
