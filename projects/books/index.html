<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open Library Explorer</title>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-5HPMN4CHL3"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-5HPMN4CHL3');</script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0f0f;--card:#1a1a1a;--border:#2a2a2a;--text:#e8e8e8;--muted:#777;--accent:#e8a838;--accent2:#f0c060;--link:#6aadff;--tag:#333}
body{font-family:'Georgia','Times New Roman',serif;background:var(--bg);color:var(--text);min-height:100vh}

.header{padding:20px 28px;border-bottom:1px solid var(--border);background:rgba(26,26,26,0.95);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:1.3rem;font-weight:700;font-family:'Inter',system-ui,sans-serif}
.header h1 span{color:var(--accent)}
.header .sub{font-size:0.68rem;color:var(--muted);font-family:'Inter',system-ui,sans-serif;margin-top:2px}

/* Search */
.search-area{max-width:1200px;margin:0 auto;padding:24px 28px}
.search-row{display:flex;gap:10px}
.search-input{flex:1;padding:12px 18px;border:1px solid var(--border);border-radius:10px;background:var(--card);color:var(--text);font-size:1rem;font-family:Georgia,serif;outline:none;transition:border-color 0.2s}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:#555}
.search-btn{padding:12px 24px;border:none;border-radius:10px;background:var(--accent);color:#111;font-size:0.85rem;font-weight:700;font-family:'Inter',system-ui,sans-serif;cursor:pointer;transition:background 0.2s;white-space:nowrap}
.search-btn:hover{background:var(--accent2)}
.search-meta{font-size:0.72rem;color:var(--muted);margin-top:8px;font-family:'Inter',system-ui,sans-serif}

/* Subjects bar */
.subjects{max-width:1200px;margin:0 auto;padding:0 28px 16px;display:flex;gap:8px;overflow-x:auto;flex-wrap:wrap}
.subjects::-webkit-scrollbar{display:none}
.subject-tag{padding:5px 14px;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--muted);font-size:0.7rem;font-family:'Inter',system-ui,sans-serif;cursor:pointer;white-space:nowrap;transition:all 0.2s}
.subject-tag:hover{border-color:var(--accent);color:var(--accent)}
.subject-tag.active{background:rgba(232,168,56,0.12);border-color:var(--accent);color:var(--accent)}

/* Content */
.content{max-width:1200px;margin:0 auto;padding:0 28px 40px}

/* Book grid */
.book-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:20px}
.book-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:transform 0.2s,border-color 0.2s}
.book-card:hover{transform:translateY(-3px);border-color:#444}
.book-cover{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;background:#222}
.book-cover-placeholder{width:100%;aspect-ratio:2/3;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a1510,#2a2018);font-size:2rem;color:var(--accent);opacity:0.3}
.book-info{padding:12px}
.book-title{font-size:0.85rem;font-weight:600;line-height:1.3;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.book-author{font-size:0.72rem;color:var(--accent2);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.book-year{font-size:0.62rem;color:var(--muted);font-family:'Inter',system-ui,sans-serif}
.book-subjects{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.book-subjects span{font-size:0.55rem;padding:2px 6px;background:var(--tag);border-radius:8px;color:var(--muted);font-family:'Inter',system-ui,sans-serif}

/* Detail modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.visible{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;max-width:700px;width:100%;max-height:90vh;overflow-y:auto;position:relative}
.modal-close{position:absolute;top:12px;right:16px;background:none;border:none;color:var(--muted);font-size:1.4rem;cursor:pointer;z-index:10}
.modal-close:hover{color:#fff}
.modal-content{display:grid;grid-template-columns:180px 1fr;gap:20px;padding:24px}
.modal-cover{width:100%;border-radius:8px;aspect-ratio:2/3;object-fit:cover;background:#222}
.modal-info h2{font-size:1.2rem;margin-bottom:4px;line-height:1.3}
.modal-info .author{font-size:0.9rem;color:var(--accent2);margin-bottom:12px}
.modal-info .meta-row{font-size:0.75rem;color:var(--muted);margin-bottom:6px;font-family:'Inter',system-ui,sans-serif}
.modal-info .meta-row b{color:var(--text)}
.modal-desc{font-size:0.82rem;line-height:1.6;color:#bbb;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.modal-link{display:inline-block;margin-top:12px;padding:8px 20px;border:1px solid var(--accent);border-radius:8px;color:var(--accent);text-decoration:none;font-size:0.75rem;font-family:'Inter',system-ui,sans-serif;transition:all 0.2s}
.modal-link:hover{background:var(--accent);color:#111}
.modal-subjects{display:flex;flex-wrap:wrap;gap:4px;margin-top:10px}
.modal-subjects span{font-size:0.62rem;padding:3px 8px;background:var(--tag);border-radius:10px;color:var(--muted);font-family:'Inter',system-ui,sans-serif;cursor:pointer}
.modal-subjects span:hover{color:var(--accent);border:1px solid var(--accent);background:transparent}

/* Loading */
.loading{text-align:center;padding:60px;color:var(--muted);font-family:'Inter',system-ui,sans-serif}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

/* Trending section */
.trending-header{font-size:1rem;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.trending-badge{font-size:0.58rem;padding:3px 10px;border-radius:10px;background:rgba(232,168,56,0.12);color:var(--accent);font-family:'Inter',system-ui,sans-serif}

@media(max-width:600px){
  .book-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
  .modal-content{grid-template-columns:1fr;text-align:center}
  .modal-cover{max-width:150px;margin:0 auto}
  .search-row{flex-direction:column}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div>
      <h1>📚 <span>Open Library</span> Explorer</h1>
      <div class="sub">Search millions of books · Powered by Open Library API</div>
    </div>
  </div>
</div>

<div class="search-area">
  <div class="search-row">
    <input type="text" class="search-input" id="searchInput" placeholder="Search books, authors, subjects..." autofocus>
    <button class="search-btn" id="searchBtn">Search</button>
  </div>
  <div class="search-meta" id="searchMeta"></div>
</div>

<div class="subjects" id="subjects">
  <div class="subject-tag active" data-s="">Trending</div>
  <div class="subject-tag" data-s="fiction">Fiction</div>
  <div class="subject-tag" data-s="science_fiction">Sci-Fi</div>
  <div class="subject-tag" data-s="fantasy">Fantasy</div>
  <div class="subject-tag" data-s="mystery">Mystery</div>
  <div class="subject-tag" data-s="romance">Romance</div>
  <div class="subject-tag" data-s="history">History</div>
  <div class="subject-tag" data-s="science">Science</div>
  <div class="subject-tag" data-s="philosophy">Philosophy</div>
  <div class="subject-tag" data-s="biography">Biography</div>
  <div class="subject-tag" data-s="poetry">Poetry</div>
  <div class="subject-tag" data-s="art">Art</div>
  <div class="subject-tag" data-s="psychology">Psychology</div>
  <div class="subject-tag" data-s="programming">Programming</div>
</div>

<div class="content" id="content">
  <div class="loading"><span class="spinner"></span>Loading trending books...</div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="modal-close" id="modalClose">&times;</button>
    <div class="modal-content" id="modalContent"></div>
  </div>
</div>

<script>
const OL = 'https://openlibrary.org';
let currentQuery = '';
let activeSubject = '';

// Trending subjects to cycle through for homepage
const TRENDING_LISTS = [
  { name: 'Popular Fiction', key: 'fiction', sort: 'rating' },
  { name: 'Classic Literature', key: 'classic_literature' },
  { name: 'Award Winners', key: 'pulitzer_prize' },
];

// Search books
async function searchBooks(query, limit = 24) {
  const url = `${OL}/search.json?q=${encodeURIComponent(query)}&limit=${limit}&fields=key,title,author_name,first_publish_year,cover_i,subject,number_of_pages_median,edition_count,ratings_average,isbn`;
  const res = await fetch(url);
  const data = await res.json();
  return data;
}

// Fetch subject
async function fetchSubject(subject, limit = 24) {
  const url = `${OL}/subjects/${subject}.json?limit=${limit}`;
  const res = await fetch(url);
  return res.json();
}

// Fetch book details
async function fetchWork(key) {
  const res = await fetch(`${OL}${key}.json`);
  return res.json();
}

// Get cover URL
function coverUrl(coverId, size = 'M') {
  if (!coverId) return null;
  return `https://covers.openlibrary.org/b/id/${coverId}-${size}.jpg`;
}

// Render book grid
function renderBooks(books, title = '', meta = '') {
  const content = document.getElementById('content');
  const titleHtml = title ? `<div class="trending-header">${esc(title)} <span class="trending-badge">Open Library</span></div>` : '';
  document.getElementById('searchMeta').textContent = meta;

  if (!books || books.length === 0) {
    content.innerHTML = titleHtml + '<div class="loading">No books found. Try a different search.</div>';
    return;
  }

  content.innerHTML = titleHtml + '<div class="book-grid">' + books.map((b, i) => {
    const cover = b.cover_id || b.cover_i;
    const title = b.title || 'Untitled';
    const authors = b.author_name || (b.authors ? b.authors.map(a => a.name) : []);
    const year = b.first_publish_year || b.first_publish_date?.split('-')[0] || '';
    const subjects = (b.subject || []).slice(0, 3);
    const key = b.key || '';

    return `<div class="book-card" data-key="${esc(key)}" data-idx="${i}">
      ${cover
        ? `<img class="book-cover" src="${coverUrl(cover, 'M')}" alt="" loading="lazy" onerror="this.outerHTML='<div class=book-cover-placeholder>📖</div>'">`
        : '<div class="book-cover-placeholder">📖</div>'}
      <div class="book-info">
        <div class="book-title">${esc(title)}</div>
        <div class="book-author">${authors.length ? esc(authors[0]) : 'Unknown'}</div>
        ${year ? `<div class="book-year">${year}</div>` : ''}
        ${subjects.length ? `<div class="book-subjects">${subjects.map(s => `<span>${esc(s)}</span>`).join('')}</div>` : ''}
      </div>
    </div>`;
  }).join('') + '</div>';

  // Click handlers
  content.querySelectorAll('.book-card').forEach(card => {
    card.onclick = () => openDetail(card.dataset.key, books[parseInt(card.dataset.idx)]);
  });
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// Open book detail modal
async function openDetail(key, book) {
  const modal = document.getElementById('modal');
  const mc = document.getElementById('modalContent');
  modal.classList.add('visible');

  const cover = book.cover_id || book.cover_i;
  const authors = book.author_name || (book.authors ? book.authors.map(a => a.name) : []);
  const year = book.first_publish_year || '';
  const subjects = (book.subject || []).slice(0, 12);
  const pages = book.number_of_pages_median || '';
  const editions = book.edition_count || '';
  const rating = book.ratings_average;

  let descText = '';
  // Fetch full work for description
  if (key) {
    try {
      const work = await fetchWork(key);
      if (work.description) {
        descText = typeof work.description === 'string' ? work.description : work.description.value || '';
      }
    } catch(e) {}
  }

  mc.innerHTML = `
    ${cover
      ? `<img class="modal-cover" src="${coverUrl(cover, 'L')}" alt="" onerror="this.style.display='none'">`
      : '<div class="modal-cover book-cover-placeholder" style="font-size:3rem">📖</div>'}
    <div class="modal-info">
      <h2>${esc(book.title || 'Untitled')}</h2>
      <div class="author">${authors.map(a => esc(a)).join(', ') || 'Unknown author'}</div>
      ${year ? `<div class="meta-row">📅 First published: <b>${year}</b></div>` : ''}
      ${pages ? `<div class="meta-row">📄 Pages: <b>${pages}</b></div>` : ''}
      ${editions ? `<div class="meta-row">📚 Editions: <b>${editions}</b></div>` : ''}
      ${rating ? `<div class="meta-row">⭐ Rating: <b>${rating.toFixed(1)} / 5</b></div>` : ''}
      ${descText ? `<div class="modal-desc">${esc(descText).substring(0, 600)}${descText.length > 600 ? '...' : ''}</div>` : ''}
      ${key ? `<a class="modal-link" href="https://openlibrary.org${key}" target="_blank" rel="noopener">View on Open Library →</a>` : ''}
      ${subjects.length ? `<div class="modal-subjects">${subjects.map(s => `<span data-s="${esc(s)}">${esc(s)}</span>`).join('')}</div>` : ''}
    </div>
  `;

  // Subject tag clicks in modal
  mc.querySelectorAll('.modal-subjects span').forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      modal.classList.remove('visible');
      document.getElementById('searchInput').value = el.dataset.s;
      doSearch(el.dataset.s);
    };
  });
}

document.getElementById('modalClose').onclick = () => document.getElementById('modal').classList.remove('visible');
document.getElementById('modal').onclick = e => { if (e.target === document.getElementById('modal')) document.getElementById('modal').classList.remove('visible'); };

// Search
async function doSearch(query) {
  currentQuery = query;
  document.getElementById('content').innerHTML = '<div class="loading"><span class="spinner"></span>Searching...</div>';
  document.querySelectorAll('.subject-tag').forEach(t => t.classList.remove('active'));

  try {
    const data = await searchBooks(query, 30);
    const count = data.numFound || 0;
    renderBooks(data.docs, `Results for "${query}"`, `${count.toLocaleString()} books found · showing top ${Math.min(30, count)}`);
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="loading">Search failed. Please try again.</div>';
  }
}

// Subject browse
async function browseSubject(subject) {
  activeSubject = subject;
  document.getElementById('searchInput').value = '';
  document.getElementById('content').innerHTML = '<div class="loading"><span class="spinner"></span>Loading...</div>';

  try {
    const data = await fetchSubject(subject, 30);
    const books = (data.works || []).map(w => ({
      ...w,
      cover_id: w.cover_id,
      author_name: w.authors ? w.authors.map(a => a.name) : [],
      first_publish_year: w.first_publish_year,
      subject: w.subject || [],
    }));
    renderBooks(books, data.name || subject, `${(data.work_count || 0).toLocaleString()} works`);
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="loading">Failed to load subject. Please try again.</div>';
  }
}

// Load trending (homepage)
async function loadTrending() {
  document.getElementById('content').innerHTML = '<div class="loading"><span class="spinner"></span>Loading trending books...</div>';

  try {
    const data = await fetchSubject('popular', 30);
    const books = (data.works || []).map(w => ({
      ...w,
      cover_id: w.cover_id,
      author_name: w.authors ? w.authors.map(a => a.name) : [],
      first_publish_year: w.first_publish_year,
      subject: w.subject || [],
    }));
    renderBooks(books, 'Trending Books', `${(data.work_count || 0).toLocaleString()} popular works`);
  } catch(e) {
    // Fallback to fiction
    try {
      const data = await fetchSubject('fiction', 30);
      const books = (data.works || []).map(w => ({
        ...w,
        cover_id: w.cover_id,
        author_name: w.authors ? w.authors.map(a => a.name) : [],
        subject: w.subject || [],
      }));
      renderBooks(books, 'Popular Fiction', '');
    } catch(e2) {
      document.getElementById('content').innerHTML = '<div class="loading">Failed to load. Please search for something!</div>';
    }
  }
}

// Event listeners
document.getElementById('searchBtn').onclick = () => {
  const q = document.getElementById('searchInput').value.trim();
  if (q) doSearch(q);
};

document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const q = e.target.value.trim();
    if (q) doSearch(q);
  }
});

document.querySelectorAll('.subject-tag').forEach(tag => {
  tag.onclick = () => {
    document.querySelectorAll('.subject-tag').forEach(t => t.classList.remove('active'));
    tag.classList.add('active');
    const s = tag.dataset.s;
    if (!s) {
      loadTrending();
    } else {
      browseSubject(s);
    }
  };
});

// Keyboard shortcut
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('modal').classList.remove('visible');
});

// Init
loadTrending();
</script>
</body>
</html>
