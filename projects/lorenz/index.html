<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lorenz Attractor</title>
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-5HPMN4CHL3"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-5HPMN4CHL3');</script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e0e0e0;font-family:'Inter',system-ui,sans-serif;overflow:hidden;height:100vh}
canvas{display:block;width:100%;height:100%;position:absolute;top:0;left:0}
.ui{position:absolute;top:16px;left:16px;z-index:10;user-select:none}
.panel{background:rgba(10,10,20,0.85);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:20px;width:260px;backdrop-filter:blur(12px)}
.panel h1{font-size:1.1rem;font-weight:700;margin-bottom:4px;background:linear-gradient(135deg,#ff6b6b,#ffd93d,#6bcb77,#4d96ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.panel .sub{font-size:0.7rem;color:#888;margin-bottom:16px}
.ctrl{margin-bottom:12px}
.ctrl label{display:flex;justify-content:space-between;font-size:0.75rem;color:#aaa;margin-bottom:4px}
.ctrl label span{color:#fff;font-weight:600;font-variant-numeric:tabular-nums}
input[type=range]{-webkit-appearance:none;width:100%;height:4px;border-radius:2px;background:rgba(255,255,255,0.1);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#fff;cursor:pointer;border:none}
.btns{display:flex;gap:8px;margin-top:16px}
.btn{flex:1;padding:6px 0;border:1px solid rgba(255,255,255,0.15);border-radius:6px;background:rgba(255,255,255,0.05);color:#ccc;font-size:0.7rem;font-weight:600;cursor:pointer;text-align:center;transition:all 0.2s}
.btn:hover{background:rgba(255,255,255,0.12);color:#fff}
.btn.active{background:rgba(100,150,255,0.2);border-color:rgba(100,150,255,0.4);color:#8bb4ff}
.presets{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px}
.preset{padding:4px 10px;border:1px solid rgba(255,255,255,0.1);border-radius:16px;background:rgba(255,255,255,0.04);color:#aaa;font-size:0.65rem;cursor:pointer;transition:all 0.2s}
.preset:hover{background:rgba(255,255,255,0.1);color:#fff}
.preset.active{background:rgba(100,150,255,0.15);border-color:rgba(100,150,255,0.3);color:#8bb4ff}
.stats{position:absolute;bottom:16px;left:16px;font-size:0.65rem;color:#555;z-index:10}
.toggle-btn{position:absolute;top:16px;right:16px;z-index:10;padding:6px 14px;border:1px solid rgba(255,255,255,0.12);border-radius:8px;background:rgba(10,10,20,0.8);color:#aaa;font-size:0.7rem;cursor:pointer;backdrop-filter:blur(8px)}
.toggle-btn:hover{color:#fff}
.color-scheme{display:flex;gap:6px;margin-top:12px}
.color-dot{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color 0.2s}
.color-dot.active{border-color:#fff}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div class="ui" id="ui">
<div class="panel">
  <h1>Lorenz Attractor</h1>
  <div class="sub">Deterministic chaos in three dimensions</div>

  <div class="ctrl">
    <label>σ (sigma) <span id="v-sigma">10</span></label>
    <input type="range" id="sigma" min="1" max="30" step="0.1" value="10">
  </div>
  <div class="ctrl">
    <label>ρ (rho) <span id="v-rho">28</span></label>
    <input type="range" id="rho" min="0" max="60" step="0.1" value="28">
  </div>
  <div class="ctrl">
    <label>β (beta) <span id="v-beta">2.667</span></label>
    <input type="range" id="beta" min="0.1" max="10" step="0.01" value="2.667">
  </div>
  <div class="ctrl">
    <label>Speed <span id="v-speed">1.0</span>x</label>
    <input type="range" id="speed" min="0.1" max="5" step="0.1" value="1">
  </div>
  <div class="ctrl">
    <label>Trail Length <span id="v-trail">8000</span></label>
    <input type="range" id="trail" min="1000" max="30000" step="500" value="8000">
  </div>
  <div class="ctrl">
    <label>Particles <span id="v-particles">3</span></label>
    <input type="range" id="particles" min="1" max="8" step="1" value="3">
  </div>

  <div class="sub" style="margin-top:12px;margin-bottom:6px">Color Scheme</div>
  <div class="color-scheme" id="colorScheme">
    <div class="color-dot active" data-scheme="rainbow" style="background:conic-gradient(#ff6b6b,#ffd93d,#6bcb77,#4d96ff,#ff6b6b)" title="Rainbow"></div>
    <div class="color-dot" data-scheme="fire" style="background:linear-gradient(135deg,#ff4500,#ff8c00,#ffd700)" title="Fire"></div>
    <div class="color-dot" data-scheme="ice" style="background:linear-gradient(135deg,#00bfff,#1e90ff,#87ceeb)" title="Ice"></div>
    <div class="color-dot" data-scheme="neon" style="background:linear-gradient(135deg,#ff00ff,#00ff88,#00bfff)" title="Neon"></div>
    <div class="color-dot" data-scheme="mono" style="background:linear-gradient(135deg,#fff,#888,#333)" title="Mono"></div>
  </div>

  <div class="sub" style="margin-top:12px;margin-bottom:6px">Presets</div>
  <div class="presets">
    <div class="preset active" data-s="10" data-r="28" data-b="2.667">Classic</div>
    <div class="preset" data-s="14" data-r="48" data-b="3">Turbulent</div>
    <div class="preset" data-s="4" data-r="14" data-b="1">Gentle</div>
    <div class="preset" data-s="16" data-r="45.92" data-b="4">Chen</div>
    <div class="preset" data-s="10" data-r="99.96" data-b="2.667">Hyperchaos</div>
  </div>

  <div class="btns">
    <div class="btn" id="btnReset">Reset</div>
    <div class="btn" id="btnPause">Pause</div>
    <div class="btn" id="btnRotate" data-active="1">Auto-Rotate</div>
  </div>
</div>
</div>

<button class="toggle-btn" id="toggleUI">Hide Controls</button>
<div class="stats" id="stats"></div>

<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2', { antialias: true, alpha: false });
if (!gl) { document.body.innerHTML = '<p style="color:#fff;padding:40px">WebGL 2 required</p>'; throw 'no webgl2'; }

// State
let sigma = 10, rho = 28, beta = 2.667, speed = 1, maxTrail = 8000, numParticles = 3;
let paused = false, autoRotate = true, colorScheme = 'rainbow';
let camTheta = 0.3, camPhi = 0.6, camDist = 80, targetDist = 80;
let dragging = false, lastX = 0, lastY = 0;

// Color schemes
const schemes = {
  rainbow: (t, i) => {
    const h = (t * 0.3 + i * 0.33) % 1;
    return hsl2rgb(h, 0.9, 0.6);
  },
  fire: (t, i) => {
    const h = (0.02 + t * 0.08 + i * 0.05) % 0.12;
    return hsl2rgb(h, 1, 0.45 + t * 0.2);
  },
  ice: (t, i) => {
    const h = 0.52 + t * 0.08 + i * 0.03;
    return hsl2rgb(h % 1, 0.7, 0.5 + t * 0.2);
  },
  neon: (t, i) => {
    const hues = [0.83, 0.45, 0.55, 0.95, 0.15, 0.35, 0.65, 0.05];
    return hsl2rgb(hues[i % hues.length], 1, 0.55);
  },
  mono: (t, i) => {
    const l = 0.3 + t * 0.5;
    return [l, l, l];
  }
};

function hsl2rgb(h, s, l) {
  const a = s * Math.min(l, 1 - l);
  const f = n => { const k = (n + h * 12) % 12; return l - a * Math.max(-1, Math.min(k - 3, 9 - k, 1)); };
  return [f(0), f(8), f(4)];
}

// Shaders
const vsrc = `#version 300 es
in vec3 aPos;
in vec3 aCol;
in float aAlpha;
uniform mat4 uMVP;
out vec3 vCol;
out float vAlpha;
void main(){
  gl_Position = uMVP * vec4(aPos, 1.0);
  gl_PointSize = 1.5;
  vCol = aCol;
  vAlpha = aAlpha;
}`;

const fsrc = `#version 300 es
precision mediump float;
in vec3 vCol;
in float vAlpha;
out vec4 fragColor;
void main(){
  fragColor = vec4(vCol * (0.6 + vAlpha * 0.4), vAlpha * 0.85);
}`;

function createShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) throw gl.getShaderInfoLog(s);
  return s;
}

const prog = gl.createProgram();
gl.attachShader(prog, createShader(gl.VERTEX_SHADER, vsrc));
gl.attachShader(prog, createShader(gl.FRAGMENT_SHADER, fsrc));
gl.linkProgram(prog);
gl.useProgram(prog);

const aPos = gl.getAttribLocation(prog, 'aPos');
const aCol = gl.getAttribLocation(prog, 'aCol');
const aAlpha = gl.getAttribLocation(prog, 'aAlpha');
const uMVP = gl.getUniformLocation(prog, 'uMVP');

// Buffers
const MAX_POINTS = 30000 * 8;
const posBuf = gl.createBuffer();
const colBuf = gl.createBuffer();
const alphaBuf = gl.createBuffer();

const posData = new Float32Array(MAX_POINTS * 3);
const colData = new Float32Array(MAX_POINTS * 3);
const alphaData = new Float32Array(MAX_POINTS);

// VAO
const vao = gl.createVertexArray();
gl.bindVertexArray(vao);

gl.bindBuffer(gl.ARRAY_BUFFER, posBuf);
gl.bufferData(gl.ARRAY_BUFFER, posData.byteLength, gl.DYNAMIC_DRAW);
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 3, gl.FLOAT, false, 0, 0);

gl.bindBuffer(gl.ARRAY_BUFFER, colBuf);
gl.bufferData(gl.ARRAY_BUFFER, colData.byteLength, gl.DYNAMIC_DRAW);
gl.enableVertexAttribArray(aCol);
gl.vertexAttribPointer(aCol, 3, gl.FLOAT, false, 0, 0);

gl.bindBuffer(gl.ARRAY_BUFFER, alphaBuf);
gl.bufferData(gl.ARRAY_BUFFER, alphaData.byteLength, gl.DYNAMIC_DRAW);
gl.enableVertexAttribArray(aAlpha);
gl.vertexAttribPointer(aAlpha, 1, gl.FLOAT, false, 0, 0);

gl.bindVertexArray(null);

// Particles
class Particle {
  constructor(i) {
    this.trail = [];
    this.x = 0.1 + i * 0.5;
    this.y = i * 0.3;
    this.z = 25 + i * 0.2;
    this.idx = i;
  }
  step(dt) {
    const dx = sigma * (this.y - this.x);
    const dy = this.x * (rho - this.z) - this.y;
    const dz = this.x * this.y - beta * this.z;
    this.x += dx * dt;
    this.y += dy * dt;
    this.z += dz * dt;
    this.trail.push(this.x, this.y, this.z);
    while (this.trail.length > maxTrail * 3) {
      this.trail.splice(0, 3);
    }
  }
}

let particles = [];
function initParticles() {
  particles = [];
  for (let i = 0; i < numParticles; i++) {
    particles.push(new Particle(i));
  }
}
initParticles();

// Matrix math
function mat4Perspective(fov, aspect, near, far) {
  const f = 1 / Math.tan(fov / 2);
  const nf = 1 / (near - far);
  return new Float32Array([
    f/aspect,0,0,0,
    0,f,0,0,
    0,0,(far+near)*nf,-1,
    0,0,2*far*near*nf,0
  ]);
}

function mat4LookAt(eye, center, up) {
  const zx=eye[0]-center[0], zy=eye[1]-center[1], zz=eye[2]-center[2];
  let len = 1/Math.sqrt(zx*zx+zy*zy+zz*zz);
  const z0=zx*len, z1=zy*len, z2=zz*len;
  const xx=up[1]*z2-up[2]*z1, xy=up[2]*z0-up[0]*z2, xz=up[0]*z1-up[1]*z0;
  len = 1/Math.sqrt(xx*xx+xy*xy+xz*xz);
  const x0=xx*len, x1=xy*len, x2=xz*len;
  const y0=z1*x2-z2*x1, y1=z2*x0-z0*x2, y2=z0*x1-z1*x0;
  return new Float32Array([
    x0,y0,z0,0,
    x1,y1,z1,0,
    x2,y2,z2,0,
    -(x0*eye[0]+x1*eye[1]+x2*eye[2]),
    -(y0*eye[0]+y1*eye[1]+y2*eye[2]),
    -(z0*eye[0]+z1*eye[1]+z2*eye[2]),
    1
  ]);
}

function mat4Mul(a, b) {
  const o = new Float32Array(16);
  for (let i = 0; i < 4; i++)
    for (let j = 0; j < 4; j++) {
      let s = 0;
      for (let k = 0; k < 4; k++) s += a[i+k*4] * b[k+j*4];
      o[i+j*4] = s;
    }
  return o;
}

// Resize
function resize() {
  canvas.width = window.innerWidth * devicePixelRatio;
  canvas.height = window.innerHeight * devicePixelRatio;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  gl.viewport(0, 0, canvas.width, canvas.height);
}
window.addEventListener('resize', resize);
resize();

// Camera controls
canvas.addEventListener('pointerdown', e => {
  dragging = true;
  lastX = e.clientX;
  lastY = e.clientY;
  canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener('pointermove', e => {
  if (!dragging) return;
  camTheta += (e.clientX - lastX) * 0.005;
  camPhi = Math.max(0.1, Math.min(Math.PI - 0.1, camPhi + (e.clientY - lastY) * 0.005));
  lastX = e.clientX;
  lastY = e.clientY;
});
canvas.addEventListener('pointerup', () => dragging = false);
canvas.addEventListener('wheel', e => {
  targetDist = Math.max(20, Math.min(200, targetDist + e.deltaY * 0.05));
  e.preventDefault();
}, { passive: false });
canvas.style.touchAction = 'none';

// UI bindings
const sliders = { sigma: 'v-sigma', rho: 'v-rho', beta: 'v-beta', speed: 'v-speed', trail: 'v-trail', particles: 'v-particles' };
Object.keys(sliders).forEach(id => {
  const el = document.getElementById(id);
  const label = document.getElementById(sliders[id]);
  el.addEventListener('input', () => {
    const v = parseFloat(el.value);
    label.textContent = v % 1 === 0 ? v : v.toFixed(v < 10 ? 3 : 1);
    if (id === 'sigma') sigma = v;
    else if (id === 'rho') rho = v;
    else if (id === 'beta') beta = v;
    else if (id === 'speed') speed = v;
    else if (id === 'trail') maxTrail = v;
    else if (id === 'particles') {
      numParticles = v;
      while (particles.length < v) particles.push(new Particle(particles.length));
      while (particles.length > v) particles.pop();
    }
  });
});

document.getElementById('btnReset').onclick = () => initParticles();
document.getElementById('btnPause').onclick = function() { paused = !paused; this.textContent = paused ? 'Resume' : 'Pause'; this.classList.toggle('active', paused); };
document.getElementById('btnRotate').onclick = function() {
  autoRotate = !autoRotate;
  this.classList.toggle('active', autoRotate);
  this.dataset.active = autoRotate ? '1' : '0';
};
document.getElementById('btnRotate').classList.add('active');

document.querySelectorAll('.preset').forEach(el => {
  el.onclick = () => {
    document.querySelectorAll('.preset').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    sigma = parseFloat(el.dataset.s); document.getElementById('sigma').value = sigma; document.getElementById('v-sigma').textContent = sigma;
    rho = parseFloat(el.dataset.r); document.getElementById('rho').value = rho; document.getElementById('v-rho').textContent = rho;
    beta = parseFloat(el.dataset.b); document.getElementById('beta').value = beta; document.getElementById('v-beta').textContent = beta;
    initParticles();
  };
});

document.querySelectorAll('.color-dot').forEach(el => {
  el.onclick = () => {
    document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
    el.classList.add('active');
    colorScheme = el.dataset.scheme;
  };
});

const uiPanel = document.getElementById('ui');
const toggleBtn = document.getElementById('toggleUI');
toggleBtn.onclick = () => {
  const vis = uiPanel.style.display !== 'none';
  uiPanel.style.display = vis ? 'none' : '';
  toggleBtn.textContent = vis ? 'Show Controls' : 'Hide Controls';
};

// Center offset (Lorenz attractor centers around 0,0,~27)
const cx = 0, cy = 0, cz = 27;

// Render loop
let lastTime = 0, totalPoints = 0;
function render(time) {
  requestAnimationFrame(render);
  const dt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;

  if (!paused) {
    const steps = Math.ceil(speed * 8);
    const subDt = (0.005 * speed) / steps;
    for (let s = 0; s < steps; s++) {
      for (const p of particles) p.step(subDt);
    }
  }

  if (autoRotate && !dragging) camTheta += dt * 0.15;
  camDist += (targetDist - camDist) * 0.1;

  // Build vertex data
  let idx = 0;
  for (let pi = 0; pi < particles.length; pi++) {
    const p = particles[pi];
    const len = p.trail.length / 3;
    for (let i = 0; i < len; i++) {
      const t = i / len;
      posData[idx * 3] = p.trail[i * 3] - cx;
      posData[idx * 3 + 1] = p.trail[i * 3 + 1] - cy;
      posData[idx * 3 + 2] = p.trail[i * 3 + 2] - cz;
      const col = schemes[colorScheme](t, pi);
      colData[idx * 3] = col[0];
      colData[idx * 3 + 1] = col[1];
      colData[idx * 3 + 2] = col[2];
      alphaData[idx] = t * t;
      idx++;
    }
  }
  totalPoints = idx;

  // Upload
  gl.bindBuffer(gl.ARRAY_BUFFER, posBuf);
  gl.bufferSubData(gl.ARRAY_BUFFER, 0, posData, 0, totalPoints * 3);
  gl.bindBuffer(gl.ARRAY_BUFFER, colBuf);
  gl.bufferSubData(gl.ARRAY_BUFFER, 0, colData, 0, totalPoints * 3);
  gl.bindBuffer(gl.ARRAY_BUFFER, alphaBuf);
  gl.bufferSubData(gl.ARRAY_BUFFER, 0, alphaData, 0, totalPoints);

  // Camera
  const ex = camDist * Math.sin(camPhi) * Math.cos(camTheta);
  const ey = camDist * Math.cos(camPhi);
  const ez = camDist * Math.sin(camPhi) * Math.sin(camTheta);
  const proj = mat4Perspective(Math.PI / 4, canvas.width / canvas.height, 0.1, 500);
  const view = mat4LookAt([ex, ey, ez], [0, 0, 0], [0, 1, 0]);
  const mvp = mat4Mul(proj, view);

  gl.clearColor(0.02, 0.02, 0.04, 1);
  gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
  gl.enable(gl.BLEND);
  gl.blendFunc(gl.SRC_ALPHA, gl.ONE);
  gl.useProgram(prog);
  gl.uniformMatrix4fv(uMVP, false, mvp);
  gl.bindVertexArray(vao);
  gl.drawArrays(gl.LINE_STRIP, 0, totalPoints);
  gl.bindVertexArray(null);

  document.getElementById('stats').textContent = `${totalPoints.toLocaleString()} points · ${(1000 / Math.max(dt * 1000, 1)).toFixed(0)} fps`;
}
requestAnimationFrame(render);
</script>
</body>
</html>
