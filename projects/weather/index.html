<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-5HPMN4CHL3"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-5HPMN4CHL3');

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Pulse — Global Weather Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0f1116;
      --surface: #181b22;
      --surface2: #21252e;
      --border: #2a2f3a;
      --text: #eef0f4;
      --text-dim: #8891a4;
      --blue: #4da6ff;
      --blue-bg: rgba(77,166,255,0.1);
      --orange: #ff9f43;
      --yellow: #ffd93d;
      --cyan: #0abde3;
      --purple: #a29bfe;
      --red: #ff6b6b;
      --green: #2ed573;
      --radius: 14px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ─── Header ─────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      height: 56px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 700;
    }

    .logo-icon { font-size: 22px; }

    .search-wrap {
      position: relative;
      width: 340px;
    }

    .search-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 16px 9px 38px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border 0.2s;
    }

    .search-input:focus { border-color: var(--blue); }
    .search-input::placeholder { color: var(--text-dim); }

    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      font-size: 14px;
    }

    .search-results {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-top: 4px;
      max-height: 300px;
      overflow-y: auto;
      display: none;
      z-index: 200;
    }

    .search-results.open { display: block; }

    .search-result {
      padding: 10px 16px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.15s;
      border-bottom: 1px solid var(--border);
    }

    .search-result:last-child { border-bottom: none; }
    .search-result:hover { background: var(--surface2); }

    .search-result-sub {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    .unit-toggle {
      display: flex;
      gap: 3px;
      background: var(--bg);
      border-radius: 8px;
      padding: 3px;
    }

    .unit-toggle button {
      background: none;
      border: none;
      color: var(--text-dim);
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    .unit-toggle button.active {
      background: var(--surface2);
      color: var(--text);
    }

    /* ─── Main content ───────────────────────── */
    .content {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    /* ─── Current weather hero ───────────────── */
    .hero {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 20px;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -20%;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, var(--blue-bg) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-left {
      z-index: 1;
    }

    .hero-location {
      font-size: 14px;
      color: var(--text-dim);
      margin-bottom: 4px;
    }

    .hero-city {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .hero-desc {
      font-size: 15px;
      color: var(--text-dim);
      margin-bottom: 20px;
      text-transform: capitalize;
    }

    .hero-temp-row {
      display: flex;
      align-items: flex-end;
      gap: 16px;
      margin-bottom: 20px;
    }

    .hero-temp {
      font-size: 72px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -3px;
    }

    .hero-feels {
      font-size: 14px;
      color: var(--text-dim);
      margin-bottom: 8px;
    }

    .hero-hi-lo {
      font-size: 15px;
      font-weight: 600;
    }

    .hero-hi { color: var(--orange); }
    .hero-lo { color: var(--cyan); }

    .hero-right {
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }

    .weather-icon {
      font-size: 96px;
      line-height: 1;
      filter: drop-shadow(0 4px 20px rgba(77,166,255,0.2));
    }

    /* ─── Detail cards grid ──────────────────── */
    .details-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .detail-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
    }

    .detail-label {
      font-size: 11px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .detail-value {
      font-size: 24px;
      font-weight: 700;
    }

    .detail-sub {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 4px;
    }

    /* ─── Hourly forecast ────────────────────── */
    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .hourly-scroll {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 8px;
      margin-bottom: 24px;
    }

    .hourly-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      min-width: 80px;
      text-align: center;
      flex-shrink: 0;
      transition: border 0.2s;
    }

    .hourly-item.now {
      border-color: var(--blue);
      background: var(--blue-bg);
    }

    .hourly-time {
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 8px;
      font-weight: 500;
    }

    .hourly-icon {
      font-size: 24px;
      margin-bottom: 8px;
    }

    .hourly-temp {
      font-size: 16px;
      font-weight: 700;
    }

    .hourly-precip {
      font-size: 11px;
      color: var(--cyan);
      margin-top: 4px;
    }

    /* ─── 7-day forecast ─────────────────────── */
    .daily-list {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 24px;
    }

    .daily-row {
      display: grid;
      grid-template-columns: 120px 50px 1fr 80px;
      align-items: center;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }

    .daily-row:last-child { border-bottom: none; }

    .daily-day {
      font-size: 14px;
      font-weight: 600;
    }

    .daily-day.today { color: var(--blue); }

    .daily-icon { font-size: 24px; text-align: center; }

    .daily-bar-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .daily-lo-val, .daily-hi-val {
      font-size: 14px;
      font-weight: 600;
      width: 36px;
    }

    .daily-lo-val { color: var(--cyan); text-align: right; }
    .daily-hi-val { color: var(--orange); }

    .daily-bar {
      flex: 1;
      height: 6px;
      background: var(--bg);
      border-radius: 3px;
      position: relative;
    }

    .daily-bar-fill {
      position: absolute;
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, var(--cyan), var(--blue), var(--orange));
    }

    .daily-precip {
      font-size: 12px;
      color: var(--cyan);
      text-align: right;
    }

    /* ─── Loading / Error ────────────────────── */
    .loading-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-dim);
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Responsive ─────────────────────────── */
    @media (max-width: 700px) {
      .hero { grid-template-columns: 1fr; padding: 24px; }
      .hero-right { justify-content: flex-start; }
      .weather-icon { font-size: 64px; }
      .hero-temp { font-size: 56px; }
      .search-wrap { width: 200px; }
      .content { padding: 16px; }
    }

    /* ─── Scrollbar ──────────────────────────── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <span class="logo-icon">⛅</span>
      Weather Pulse
    </div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="search" type="text"
             placeholder="Search any city..." autocomplete="off" />
      <div class="search-results" id="search-results"></div>
    </div>
    <div class="unit-toggle">
      <button class="active" data-unit="celsius">°C</button>
      <button data-unit="fahrenheit">°F</button>
    </div>
  </header>

  <div class="content" id="content">
    <div class="loading-state" id="loading">
      <div class="spinner"></div>
      <div>Detecting your location...</div>
    </div>
  </div>

  <script>
    // ─── State ────────────────────────────────────────
    let unit = 'celsius';
    let currentCity = null;
    let weatherData = null;
    let searchTimeout = null;

    // ─── WMO weather codes ───────────────────────────
    const WMO = {
      0:  { desc: 'Clear sky',            icon: '☀️',  night: '🌙' },
      1:  { desc: 'Mainly clear',         icon: '🌤️', night: '🌙' },
      2:  { desc: 'Partly cloudy',        icon: '⛅',  night: '☁️' },
      3:  { desc: 'Overcast',             icon: '☁️',  night: '☁️' },
      45: { desc: 'Foggy',                icon: '🌫️', night: '🌫️' },
      48: { desc: 'Depositing rime fog',  icon: '🌫️', night: '🌫️' },
      51: { desc: 'Light drizzle',        icon: '🌦️', night: '🌧️' },
      53: { desc: 'Moderate drizzle',     icon: '🌦️', night: '🌧️' },
      55: { desc: 'Dense drizzle',        icon: '🌧️', night: '🌧️' },
      61: { desc: 'Slight rain',          icon: '🌦️', night: '🌧️' },
      63: { desc: 'Moderate rain',        icon: '🌧️', night: '🌧️' },
      65: { desc: 'Heavy rain',           icon: '🌧️', night: '🌧️' },
      66: { desc: 'Freezing rain',        icon: '🌧️', night: '🌧️' },
      67: { desc: 'Heavy freezing rain',  icon: '🌧️', night: '🌧️' },
      71: { desc: 'Slight snow',          icon: '🌨️', night: '🌨️' },
      73: { desc: 'Moderate snow',        icon: '❄️',  night: '❄️' },
      75: { desc: 'Heavy snow',           icon: '❄️',  night: '❄️' },
      77: { desc: 'Snow grains',          icon: '❄️',  night: '❄️' },
      80: { desc: 'Rain showers',         icon: '🌦️', night: '🌧️' },
      81: { desc: 'Moderate showers',     icon: '🌧️', night: '🌧️' },
      82: { desc: 'Violent showers',      icon: '⛈️',  night: '⛈️' },
      85: { desc: 'Snow showers',         icon: '🌨️', night: '🌨️' },
      86: { desc: 'Heavy snow showers',   icon: '❄️',  night: '❄️' },
      95: { desc: 'Thunderstorm',         icon: '⛈️',  night: '⛈️' },
      96: { desc: 'Thunderstorm w/ hail', icon: '⛈️',  night: '⛈️' },
      99: { desc: 'Thunderstorm w/ heavy hail', icon: '⛈️', night: '⛈️' },
    };

    function getWeatherInfo(code, isNight) {
      const w = WMO[code] || WMO[0];
      return { desc: w.desc, icon: isNight ? w.night : w.icon };
    }

    function windDir(deg) {
      const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
      return dirs[Math.round(deg / 22.5) % 16];
    }

    function tempStr(c) {
      if (unit === 'fahrenheit') return Math.round(c * 9/5 + 32) + '°F';
      return Math.round(c) + '°C';
    }

    function speedStr(kmh) {
      if (unit === 'fahrenheit') return Math.round(kmh * 0.621) + ' mph';
      return Math.round(kmh) + ' km/h';
    }

    // ─── Geocoding ───────────────────────────────────
    async function searchCities(query) {
      if (!query || query.length < 2) return [];
      try {
        const res = await fetch(
          `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=6&language=en`
        );
        const data = await res.json();
        return data.results || [];
      } catch { return []; }
    }

    // ─── Fetch weather ───────────────────────────────
    async function fetchWeather(lat, lon, name, country) {
      currentCity = { lat, lon, name, country };

      try {
        const params = [
          'current=temperature_2m,relative_humidity_2m,apparent_temperature,is_day,precipitation,rain,weather_code,wind_speed_10m,wind_direction_10m,wind_gusts_10m,surface_pressure',
          'hourly=temperature_2m,precipitation_probability,weather_code,is_day',
          'daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset,uv_index_max,precipitation_sum,precipitation_probability_max,wind_speed_10m_max',
          'timezone=auto',
          'forecast_days=8'
        ].join('&');

        const res = await fetch(
          `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&${params}`
        );
        weatherData = await res.json();
        render();
      } catch (e) {
        console.error('Weather fetch error:', e);
        document.getElementById('content').innerHTML =
          '<div class="loading-state">Failed to load weather data. Please try again.</div>';
      }
    }

    // ─── Render ──────────────────────────────────────
    function render() {
      if (!weatherData || !currentCity) return;

      const c = weatherData.current;
      const h = weatherData.hourly;
      const d = weatherData.daily;
      const isNight = !c.is_day;
      const wi = getWeatherInfo(c.weather_code, isNight);

      // Hero
      const heroHtml = `
        <div class="hero">
          <div class="hero-left">
            <div class="hero-location">${currentCity.country || ''}</div>
            <div class="hero-city">${currentCity.name}</div>
            <div class="hero-desc">${wi.desc}</div>
            <div class="hero-temp-row">
              <div class="hero-temp">${tempStr(c.temperature_2m)}</div>
              <div>
                <div class="hero-feels">Feels like ${tempStr(c.apparent_temperature)}</div>
                <div class="hero-hi-lo">
                  <span class="hero-hi">↑ ${tempStr(d.temperature_2m_max[0])}</span>
                  &nbsp;
                  <span class="hero-lo">↓ ${tempStr(d.temperature_2m_min[0])}</span>
                </div>
              </div>
            </div>
          </div>
          <div class="hero-right">
            <div class="weather-icon">${wi.icon}</div>
          </div>
        </div>
      `;

      // Detail cards
      const sunrise = new Date(d.sunrise[0]).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      const sunset = new Date(d.sunset[0]).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      const detailsHtml = `
        <div class="details-grid">
          <div class="detail-card">
            <div class="detail-label">💨 Wind</div>
            <div class="detail-value">${speedStr(c.wind_speed_10m)}</div>
            <div class="detail-sub">${windDir(c.wind_direction_10m)} · Gusts ${speedStr(c.wind_gusts_10m)}</div>
          </div>
          <div class="detail-card">
            <div class="detail-label">💧 Humidity</div>
            <div class="detail-value">${c.relative_humidity_2m}%</div>
            <div class="detail-sub">Dew point approx ${tempStr(c.temperature_2m - ((100 - c.relative_humidity_2m) / 5))}</div>
          </div>
          <div class="detail-card">
            <div class="detail-label">🌧️ Precipitation</div>
            <div class="detail-value">${c.precipitation} mm</div>
            <div class="detail-sub">Today total: ${d.precipitation_sum[0]} mm</div>
          </div>
          <div class="detail-card">
            <div class="detail-label">📊 Pressure</div>
            <div class="detail-value">${Math.round(c.surface_pressure)} hPa</div>
            <div class="detail-sub">${c.surface_pressure > 1013 ? 'High pressure' : 'Low pressure'}</div>
          </div>
          <div class="detail-card">
            <div class="detail-label">☀️ UV Index</div>
            <div class="detail-value">${d.uv_index_max[0]}</div>
            <div class="detail-sub">${uvLabel(d.uv_index_max[0])}</div>
          </div>
          <div class="detail-card">
            <div class="detail-label">🌅 Sun</div>
            <div class="detail-value" style="font-size:18px">↑${sunrise}</div>
            <div class="detail-sub">Sunset ↓${sunset}</div>
          </div>
        </div>
      `;

      // Hourly (next 24h)
      const nowHour = new Date().getHours();
      const hourlyStartIdx = h.time.findIndex(t => new Date(t).getHours() === nowHour && new Date(t) >= new Date(Date.now() - 3600000));
      const hourlySlice = Math.max(0, hourlyStartIdx);

      let hourlyHtml = '<div class="section-title">Hourly Forecast</div><div class="hourly-scroll">';
      for (let i = hourlySlice; i < Math.min(hourlySlice + 24, h.time.length); i++) {
        const dt = new Date(h.time[i]);
        const hr = dt.getHours();
        const isNow = i === hourlySlice;
        const hIsNight = !h.is_day[i];
        const hInfo = getWeatherInfo(h.weather_code[i], hIsNight);
        const precip = h.precipitation_probability[i];

        hourlyHtml += `
          <div class="hourly-item${isNow ? ' now' : ''}">
            <div class="hourly-time">${isNow ? 'Now' : hr + ':00'}</div>
            <div class="hourly-icon">${hInfo.icon}</div>
            <div class="hourly-temp">${tempStr(h.temperature_2m[i])}</div>
            ${precip > 0 ? `<div class="hourly-precip">${precip}%</div>` : ''}
          </div>
        `;
      }
      hourlyHtml += '</div>';

      // Daily (7 days)
      const allMin = Math.min(...d.temperature_2m_min);
      const allMax = Math.max(...d.temperature_2m_max);
      const tempRange = allMax - allMin || 1;
      const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      const today = new Date().getDay();

      let dailyHtml = '<div class="section-title">7-Day Forecast</div><div class="daily-list">';
      for (let i = 0; i < Math.min(7, d.time.length); i++) {
        const dt = new Date(d.time[i]);
        const dayName = i === 0 ? 'Today' : i === 1 ? 'Tomorrow' : dayNames[dt.getDay()];
        const dInfo = getWeatherInfo(d.weather_code[i], false);
        const lo = d.temperature_2m_min[i];
        const hi = d.temperature_2m_max[i];
        const left = ((lo - allMin) / tempRange * 100).toFixed(1);
        const width = (((hi - lo) / tempRange) * 100).toFixed(1);
        const precip = d.precipitation_probability_max[i];

        dailyHtml += `
          <div class="daily-row">
            <div class="daily-day${i === 0 ? ' today' : ''}">${dayName}</div>
            <div class="daily-icon">${dInfo.icon}</div>
            <div class="daily-bar-wrap">
              <div class="daily-lo-val">${tempStr(lo)}</div>
              <div class="daily-bar">
                <div class="daily-bar-fill" style="left:${left}%;width:${width}%"></div>
              </div>
              <div class="daily-hi-val">${tempStr(hi)}</div>
            </div>
            <div class="daily-precip">${precip > 0 ? precip + '% 💧' : ''}</div>
          </div>
        `;
      }
      dailyHtml += '</div>';

      document.getElementById('content').innerHTML = heroHtml + detailsHtml + hourlyHtml + dailyHtml;
    }

    function uvLabel(uv) {
      if (uv <= 2) return 'Low';
      if (uv <= 5) return 'Moderate';
      if (uv <= 7) return 'High';
      if (uv <= 10) return 'Very High';
      return 'Extreme';
    }

    // ─── Search ──────────────────────────────────────
    const searchInput = document.getElementById('search');
    const searchResults = document.getElementById('search-results');

    searchInput.addEventListener('input', () => {
      clearTimeout(searchTimeout);
      const q = searchInput.value.trim();
      if (q.length < 2) {
        searchResults.classList.remove('open');
        return;
      }
      searchTimeout = setTimeout(async () => {
        const cities = await searchCities(q);
        if (cities.length === 0) {
          searchResults.classList.remove('open');
          return;
        }
        searchResults.innerHTML = cities.map(c => `
          <div class="search-result" data-lat="${c.latitude}" data-lon="${c.longitude}"
               data-name="${c.name}" data-country="${c.country || ''}">
            <div>${c.name}</div>
            <div class="search-result-sub">${[c.admin1, c.country].filter(Boolean).join(', ')}</div>
          </div>
        `).join('');
        searchResults.classList.add('open');

        searchResults.querySelectorAll('.search-result').forEach(el => {
          el.addEventListener('click', () => {
            const { lat, lon, name, country } = el.dataset;
            searchInput.value = name;
            searchResults.classList.remove('open');
            document.getElementById('content').innerHTML =
              '<div class="loading-state"><div class="spinner"></div>Loading weather...</div>';
            fetchWeather(lat, lon, name, country);
          });
        });
      }, 300);
    });

    searchInput.addEventListener('focus', () => {
      if (searchResults.children.length > 0) searchResults.classList.add('open');
    });

    document.addEventListener('click', e => {
      if (!e.target.closest('.search-wrap')) searchResults.classList.remove('open');
    });

    // ─── Unit toggle ─────────────────────────────────
    document.querySelectorAll('.unit-toggle button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.unit-toggle button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        unit = btn.dataset.unit;
        render();
      });
    });

    // ─── Geolocation init ────────────────────────────
    async function init() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          async pos => {
            const { latitude, longitude } = pos.coords;
            // Reverse geocode for city name
            try {
              const res = await fetch(
                `https://geocoding-api.open-meteo.com/v1/search?name=&count=1&language=en`
              );
            } catch {}
            // Use nominatim for reverse geocoding
            try {
              const res = await fetch(
                `https://nominatim.openstreetmap.org/reverse?lat=${latitude}&lon=${longitude}&format=json&zoom=10&accept-language=en`
              );
              const geo = await res.json();
              const city = geo.address?.city || geo.address?.town || geo.address?.village || geo.address?.county || 'Your Location';
              const country = geo.address?.country || '';
              fetchWeather(latitude, longitude, city, country);
            } catch {
              fetchWeather(latitude, longitude, 'Your Location', '');
            }
          },
          () => {
            // Default to London
            fetchWeather(51.5074, -0.1278, 'London', 'United Kingdom');
          },
          { timeout: 5000 }
        );
      } else {
        fetchWeather(51.5074, -0.1278, 'London', 'United Kingdom');
      }
    }

    init();

    // Auto-refresh every 10 minutes
    setInterval(() => {
      if (currentCity) {
        fetchWeather(currentCity.lat, currentCity.lon, currentCity.name, currentCity.country);
      }
    }, 600000);
  </script>
</body>
</html>
