<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Art Atlas — Art Institute of Chicago Explorer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0c0a0e;--card:#1a1520;--card2:#221d28;--border:#2a2332;
  --text:#ece4f0;--dim:#8b7f96;--accent:#c084fc;--accent2:#a855f7;
  --warm:#f59e0b;--rose:#fb7185;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* Header */
.header{background:linear-gradient(135deg,#140f1a,#1f1828);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.header h1{font-size:1.3rem;font-weight:700;display:flex;align-items:center;gap:10px}
.header .sub{color:var(--dim);font-size:.78rem;margin-left:auto}

/* Search */
.search-bar{padding:16px 24px;background:var(--card);border-bottom:1px solid var(--border);display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.search-input{flex:1;min-width:200px;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px 16px;border-radius:10px;font-size:.85rem;font-family:inherit;outline:none;transition:border .2s}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--dim)}
.cat-pills{display:flex;gap:6px;overflow-x:auto;flex-wrap:nowrap;padding-bottom:4px}
.cat-pill{background:var(--bg);border:1px solid var(--border);color:var(--dim);padding:6px 14px;border-radius:20px;font-size:.72rem;cursor:pointer;transition:all .2s;white-space:nowrap;font-family:inherit}
.cat-pill:hover{border-color:var(--accent);color:var(--accent)}
.cat-pill.active{background:var(--accent2);border-color:var(--accent2);color:#fff}

/* Stats */
.stats-row{display:flex;gap:10px;padding:12px 24px;overflow-x:auto;background:rgba(26,21,32,.5)}
.stat-chip{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-size:.72rem;color:var(--dim);white-space:nowrap;flex-shrink:0}
.stat-chip b{color:var(--text);font-size:.85rem;margin-right:4px}

/* Grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;padding:20px 24px}
.art-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .3s;position:relative}
.art-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.5);border-color:var(--accent)}
.art-img-wrap{position:relative;width:100%;padding-top:100%;background:var(--card2);overflow:hidden}
.art-img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;transition:transform .5s}
.art-card:hover .art-img{transform:scale(1.05)}
.art-placeholder{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:3rem;background:linear-gradient(135deg,var(--card2),var(--bg))}
.art-info{padding:14px}
.art-title{font-size:.85rem;font-weight:600;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.art-artist{font-size:.75rem;color:var(--accent);margin-bottom:4px}
.art-meta{font-size:.65rem;color:var(--dim)}
.art-type{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);padding:3px 10px;border-radius:12px;font-size:.6rem;color:var(--text);font-weight:600}

/* Load more */
.load-more{text-align:center;padding:24px}
.load-btn{background:var(--card);border:1px solid var(--border);color:var(--text);padding:10px 32px;border-radius:10px;font-size:.8rem;cursor:pointer;font-family:inherit;transition:all .2s}
.load-btn:hover{border-color:var(--accent);color:var(--accent)}
.load-btn:disabled{opacity:.5;cursor:default}

/* Detail modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(12,10,14,.95);z-index:5000;overflow-y:auto}
.modal-overlay.open{display:flex;justify-content:center;padding:24px}
.modal{max-width:1000px;width:100%;display:flex;gap:24px;flex-wrap:wrap;align-items:flex-start}
.modal-img-wrap{flex:1;min-width:300px;position:relative;border-radius:12px;overflow:hidden;background:var(--card)}
.modal-img{width:100%;display:block;border-radius:12px}
.modal-img-placeholder{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:6rem;background:linear-gradient(135deg,var(--card2),var(--bg));border-radius:12px}
.modal-details{flex:1;min-width:280px}
.modal-close{position:fixed;top:20px;right:20px;background:rgba(0,0,0,.6);border:1px solid var(--border);color:var(--text);width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:1.3rem;z-index:5001;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:var(--card)}
.modal-title{font-size:1.5rem;font-weight:700;margin-bottom:8px;line-height:1.3}
.modal-artist{font-size:1rem;color:var(--accent);margin-bottom:4px}
.modal-date{font-size:.85rem;color:var(--dim);margin-bottom:16px}
.modal-desc{font-size:.82rem;line-height:1.6;color:var(--dim);margin-bottom:16px}
.modal-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.modal-tag{background:var(--card);border:1px solid var(--border);padding:4px 12px;border-radius:14px;font-size:.68rem;color:var(--dim)}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.detail-item{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px}
.detail-item .di-label{font-size:.6rem;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
.detail-item .di-val{font-size:.8rem;font-weight:600;margin-top:2px}
.modal-link{display:inline-block;background:var(--accent2);color:#fff;padding:8px 24px;border-radius:8px;font-size:.8rem;font-weight:600;text-decoration:none;transition:opacity .2s}
.modal-link:hover{opacity:.8}

/* Skeleton loading */
.skeleton{background:linear-gradient(90deg,var(--card2) 25%,var(--border) 50%,var(--card2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* Responsive */
@media(max-width:700px){
  .grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;padding:12px}
  .art-info{padding:10px}
  .modal{flex-direction:column}
  .header{padding:12px 16px}
  .search-bar{padding:12px 16px}
}

/* Loading */
.page-loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s}
.page-loader.hidden{opacity:0;pointer-events:none}
.loader-art{font-size:3rem;animation:float 2s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.loader-text{margin-top:12px;color:var(--dim);font-size:.85rem}
</style>
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-5HPMN4CHL3"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-5HPMN4CHL3');</script>
</head>
<body>
<div class="page-loader" id="loader">
  <div class="loader-art">🎨</div>
  <div class="loader-text">Loading masterpieces…</div>
</div>

<header class="header">
  <h1><span style="font-size:1.4rem">🖼️</span> Art Atlas</h1>
  <span class="sub">Art Institute of Chicago — 300,000+ Artworks</span>
</header>

<div class="search-bar">
  <input class="search-input" id="searchInput" type="text" placeholder="Search artworks, artists, styles…">
  <div class="cat-pills" id="catPills"></div>
</div>

<div class="stats-row" id="statsRow">
  <div class="stat-chip"><b id="stTotal">—</b> results</div>
  <div class="stat-chip"><b id="stPage">1</b> page</div>
  <div class="stat-chip" id="stQuery" style="display:none">Query: <b id="stQueryText">—</b></div>
</div>

<div class="grid" id="grid"></div>

<div class="load-more" id="loadMore" style="display:none">
  <button class="load-btn" id="loadBtn" onclick="loadNextPage()">Load More</button>
</div>

<div class="modal-overlay" id="modal">
  <button class="modal-close" onclick="closeModal()">×</button>
  <div class="modal" id="modalContent"></div>
</div>

<script>
const API = 'https://api.artic.edu/api/v1';
const IIIF = 'https://www.artic.edu/iiif/2';

const CATEGORIES = [
  { label: 'Highlights', query: '', params: 'query[term][is_boosted]=true' },
  { label: 'Impressionism', query: 'impressionism' },
  { label: 'Modern Art', query: 'modern art' },
  { label: 'Photography', query: '', params: 'query[term][classification_titles]=photograph' },
  { label: 'Japanese', query: 'japanese woodblock' },
  { label: 'Sculpture', query: 'sculpture' },
  { label: 'Portraits', query: 'portrait painting' },
  { label: 'Watercolor', query: 'watercolor' },
  { label: 'Abstract', query: 'abstract art' },
  { label: 'Renaissance', query: 'renaissance' },
  { label: 'Ancient', query: 'ancient greek roman' },
  { label: 'Textiles', query: 'textile weaving' }
];

let currentPage = 1, totalPages = 1, totalResults = 0;
let currentQuery = '', currentCategory = 0, isLoading = false;
const artworks = [];

// Build category pills
const pillsEl = document.getElementById('catPills');
CATEGORIES.forEach((cat, i) => {
  const btn = document.createElement('button');
  btn.className = 'cat-pill' + (i === 0 ? ' active' : '');
  btn.textContent = cat.label;
  btn.onclick = () => selectCategory(i);
  pillsEl.appendChild(btn);
});

function selectCategory(idx) {
  currentCategory = idx;
  document.querySelectorAll('.cat-pill').forEach((p, i) => p.classList.toggle('active', i === idx));
  document.getElementById('searchInput').value = '';
  currentQuery = '';
  freshSearch();
}

// Search
let searchTimer;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    currentQuery = e.target.value.trim();
    if (currentQuery) {
      document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
      currentCategory = -1;
    }
    freshSearch();
  }, 400);
});

function freshSearch() {
  currentPage = 1;
  artworks.length = 0;
  document.getElementById('grid').innerHTML = '';
  fetchArtworks();
}

async function fetchArtworks() {
  if (isLoading) return;
  isLoading = true;
  const btn = document.getElementById('loadBtn');
  if (btn) btn.disabled = true;

  const fields = 'id,title,artist_display,date_display,image_id,thumbnail,artwork_type_title,classification_titles,medium_display,dimensions,credit_line,place_of_origin,style_titles,department_title,is_public_domain';
  let url;

  if (currentCategory >= 0 && CATEGORIES[currentCategory]) {
    const cat = CATEGORIES[currentCategory];
    if (cat.params) {
      url = `${API}/artworks/search?${cat.params}&fields=${fields}&page=${currentPage}&limit=24`;
    } else if (cat.query) {
      url = `${API}/artworks/search?q=${encodeURIComponent(cat.query)}&fields=${fields}&page=${currentPage}&limit=24`;
    } else {
      url = `${API}/artworks/search?query[term][is_boosted]=true&fields=${fields}&page=${currentPage}&limit=24`;
    }
  } else if (currentQuery) {
    url = `${API}/artworks/search?q=${encodeURIComponent(currentQuery)}&fields=${fields}&page=${currentPage}&limit=24`;
  } else {
    url = `${API}/artworks?fields=${fields}&page=${currentPage}&limit=24`;
  }

  try {
    const res = await fetch(url);
    const json = await res.json();
    const items = json.data || [];
    totalResults = json.pagination?.total || 0;
    totalPages = json.pagination?.total_pages || 1;

    items.forEach(item => artworks.push(item));
    renderGrid(items, currentPage === 1);
    updateStats();
  } catch (e) {
    console.error('Fetch error:', e);
  }

  isLoading = false;
  if (btn) btn.disabled = false;
  document.getElementById('loader').classList.add('hidden');
  document.getElementById('loadMore').style.display = currentPage < totalPages ? 'block' : 'none';
}

function loadNextPage() {
  currentPage++;
  fetchArtworks();
}

function updateStats() {
  document.getElementById('stTotal').textContent = totalResults.toLocaleString();
  document.getElementById('stPage').textContent = `${currentPage}/${totalPages}`;
  const qEl = document.getElementById('stQuery');
  const label = currentCategory >= 0 ? CATEGORIES[currentCategory]?.label : currentQuery;
  if (label) {
    qEl.style.display = '';
    document.getElementById('stQueryText').textContent = label;
  } else {
    qEl.style.display = 'none';
  }
}

function imgUrl(imageId, size) {
  if (!imageId) return '';
  return `${IIIF}/${imageId}/full/${size},/0/default.jpg`;
}

const artEmojis = ['🎨','🖌️','🗿','📷','✏️','🎭','🏺','🖼️'];

function renderGrid(items, replace) {
  const grid = document.getElementById('grid');
  if (replace) grid.innerHTML = '';

  items.forEach(item => {
    const card = document.createElement('div');
    card.className = 'art-card';
    card.onclick = () => openModal(item.id);

    const hasImage = !!item.image_id;
    const emoji = artEmojis[Math.abs(hashCode(item.title || '')) % artEmojis.length];

    card.innerHTML = `
      <div class="art-img-wrap">
        ${hasImage
          ? `<img class="art-img" src="${imgUrl(item.image_id, 400)}" alt="${esc(item.title)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="art-placeholder" style="display:none">${emoji}</div>`
          : `<div class="art-placeholder">${emoji}</div>`
        }
        ${item.artwork_type_title ? `<div class="art-type">${esc(item.artwork_type_title)}</div>` : ''}
      </div>
      <div class="art-info">
        <div class="art-title">${esc(item.title)}</div>
        <div class="art-artist">${esc(item.artist_display || 'Unknown')}</div>
        <div class="art-meta">${esc(item.date_display || '')}${item.place_of_origin ? ' · ' + esc(item.place_of_origin) : ''}</div>
      </div>
    `;
    grid.appendChild(card);
  });
}

function hashCode(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
  return h;
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// Modal
async function openModal(id) {
  const modal = document.getElementById('modal');
  const content = document.getElementById('modalContent');

  // Try cached first
  let item = artworks.find(a => a.id === id);

  // Fetch full details
  try {
    const res = await fetch(`${API}/artworks/${id}?fields=id,title,artist_display,date_display,image_id,thumbnail,artwork_type_title,classification_titles,medium_display,dimensions,credit_line,place_of_origin,style_titles,department_title,is_public_domain,description,publication_history,exhibition_history,provenance_text,artist_title,date_start,date_end,color`);
    const json = await res.json();
    if (json.data) item = json.data;
  } catch (e) {}

  if (!item) return;

  const hasImage = !!item.image_id;
  const emoji = artEmojis[Math.abs(hashCode(item.title || '')) % artEmojis.length];
  const styles = (item.style_titles || []).concat(item.classification_titles || []);
  const desc = item.description ? item.description.replace(/<[^>]+>/g, ' ').substring(0, 600) : '';

  content.innerHTML = `
    <div class="modal-img-wrap">
      ${hasImage
        ? `<img class="modal-img" src="${imgUrl(item.image_id, 843)}" alt="${esc(item.title)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="modal-img-placeholder" style="display:none">${emoji}</div>`
        : `<div class="modal-img-placeholder">${emoji}</div>`
      }
    </div>
    <div class="modal-details">
      <div class="modal-title">${esc(item.title)}</div>
      <div class="modal-artist">${esc(item.artist_display || item.artist_title || 'Unknown Artist')}</div>
      <div class="modal-date">${esc(item.date_display || '')}</div>
      ${desc ? `<div class="modal-desc">${esc(desc)}</div>` : ''}
      ${styles.length ? `<div class="modal-tags">${styles.map(s => `<span class="modal-tag">${esc(s)}</span>`).join('')}</div>` : ''}
      <div class="detail-grid">
        ${item.medium_display ? `<div class="detail-item"><div class="di-label">Medium</div><div class="di-val">${esc(item.medium_display)}</div></div>` : ''}
        ${item.dimensions ? `<div class="detail-item"><div class="di-label">Dimensions</div><div class="di-val">${esc(item.dimensions)}</div></div>` : ''}
        ${item.place_of_origin ? `<div class="detail-item"><div class="di-label">Origin</div><div class="di-val">${esc(item.place_of_origin)}</div></div>` : ''}
        ${item.department_title ? `<div class="detail-item"><div class="di-label">Department</div><div class="di-val">${esc(item.department_title)}</div></div>` : ''}
        ${item.artwork_type_title ? `<div class="detail-item"><div class="di-label">Type</div><div class="di-val">${esc(item.artwork_type_title)}</div></div>` : ''}
        <div class="detail-item"><div class="di-label">Public Domain</div><div class="di-val">${item.is_public_domain ? '✓ Yes' : '✗ No'}</div></div>
      </div>
      ${item.credit_line ? `<div style="font-size:.7rem;color:var(--dim);margin-bottom:16px"><em>${esc(item.credit_line)}</em></div>` : ''}
      <a class="modal-link" href="https://www.artic.edu/artworks/${item.id}" target="_blank" rel="noopener">View on artic.edu →</a>
    </div>
  `;

  modal.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
document.getElementById('modal').addEventListener('click', e => {
  if (e.target.id === 'modal') closeModal();
});

// Init
fetchArtworks();
</script>
</body>
</html>
