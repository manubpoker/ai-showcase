<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tides & Currents</title>
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-5HPMN4CHL3"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-5HPMN4CHL3');</script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e1a;--card:#111827;--border:#1e293b;--text:#e2e8f0;--muted:#64748b;--accent:#06b6d4;--accent2:#0ea5e9;--high:#22d3ee;--low:#f472b6;--warn:#f59e0b}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--border);background:rgba(17,24,39,0.9);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100}
.header h1{font-size:1.15rem;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .sub{font-size:0.7rem;color:var(--muted);margin-top:2px}
.live-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#22c55e;margin-right:6px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.header-right{display:flex;align-items:center;gap:16px}
.last-update{font-size:0.7rem;color:var(--muted)}

/* Layout */
.layout{display:grid;grid-template-columns:340px 1fr;grid-template-rows:auto 1fr;min-height:calc(100vh - 57px)}
.sidebar{grid-row:1/3;border-right:1px solid var(--border);overflow-y:auto;background:var(--card)}
.main{display:flex;flex-direction:column;overflow:hidden}

/* Station list */
.search-box{padding:12px;border-bottom:1px solid var(--border)}
.search-box input{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:8px;background:rgba(255,255,255,0.05);color:var(--text);font-size:0.8rem;outline:none}
.search-box input:focus{border-color:var(--accent)}
.station-list{overflow-y:auto;max-height:calc(100vh - 140px)}
.station-item{padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.2s}
.station-item:hover{background:rgba(6,182,212,0.08)}
.station-item.active{background:rgba(6,182,212,0.12);border-left:3px solid var(--accent)}
.station-name{font-size:0.8rem;font-weight:600;margin-bottom:2px}
.station-id{font-size:0.65rem;color:var(--muted)}
.station-meta{display:flex;gap:8px;margin-top:4px}
.station-meta span{font-size:0.65rem;padding:2px 6px;border-radius:4px;background:rgba(255,255,255,0.06)}
.station-level{font-size:0.85rem;font-weight:700;color:var(--accent);float:right;margin-top:-20px}

/* Map */
.map-container{height:280px;position:relative}
#map{width:100%;height:100%}

/* Cards */
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:16px}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px}
.card-label{font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px}
.card-value{font-size:1.4rem;font-weight:700}
.card-unit{font-size:0.7rem;color:var(--muted);margin-left:4px}
.card-sub{font-size:0.65rem;color:var(--muted);margin-top:4px}
.card-value.high{color:var(--high)}
.card-value.low{color:var(--low)}

/* Chart */
.chart-section{flex:1;padding:0 16px 16px;min-height:0}
.chart-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.chart-header h2{font-size:0.9rem;font-weight:600}
.chart-tabs{display:flex;gap:6px}
.chart-tab{padding:4px 12px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--muted);font-size:0.7rem;cursor:pointer;transition:all 0.2s}
.chart-tab.active{background:rgba(6,182,212,0.15);border-color:var(--accent);color:var(--accent)}
.chart-wrap{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;height:calc(100% - 30px);position:relative}
canvas#tideChart{width:100%;height:100%}

/* Loading */
.loading{display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);font-size:0.85rem}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin-right:10px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Tide indicator */
.tide-indicator{display:flex;align-items:center;gap:6px;font-size:0.75rem}
.tide-arrow{font-size:1rem}
.tide-rising{color:#22d3ee}
.tide-falling{color:#f472b6}

/* Responsive */
@media(max-width:900px){
  .layout{grid-template-columns:1fr;grid-template-rows:auto auto 1fr}
  .sidebar{grid-row:auto;max-height:200px;border-right:none;border-bottom:1px solid var(--border)}
  .station-list{max-height:120px}
  .cards{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:500px){
  .cards{grid-template-columns:1fr 1fr;gap:8px;padding:8px}
  .map-container{height:200px}
}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1><span class="live-dot"></span>Tides & Currents</h1>
    <div class="sub">Real-time NOAA water level monitoring</div>
  </div>
  <div class="header-right">
    <div class="tide-indicator" id="tideIndicator"></div>
    <div class="last-update" id="lastUpdate">Loading...</div>
  </div>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search stations...">
    </div>
    <div class="station-list" id="stationList">
      <div class="loading"><div class="spinner"></div>Loading stations...</div>
    </div>
  </div>

  <div class="main">
    <div class="map-container">
      <div id="map"></div>
    </div>

    <div class="cards" id="cards">
      <div class="card">
        <div class="card-label">Water Level</div>
        <div class="card-value" id="cardLevel">--</div>
        <div class="card-sub" id="cardLevelSub">MLLW datum</div>
      </div>
      <div class="card">
        <div class="card-label">Next High Tide</div>
        <div class="card-value high" id="cardHigh">--</div>
        <div class="card-sub" id="cardHighTime">--</div>
      </div>
      <div class="card">
        <div class="card-label">Next Low Tide</div>
        <div class="card-value low" id="cardLow">--</div>
        <div class="card-sub" id="cardLowTime">--</div>
      </div>
      <div class="card">
        <div class="card-label">Water Temp</div>
        <div class="card-value" id="cardTemp">--</div>
        <div class="card-sub" id="cardTempSub">--</div>
      </div>
    </div>

    <div class="chart-section">
      <div class="chart-header">
        <h2>Water Level & Predictions</h2>
        <div class="chart-tabs">
          <button class="chart-tab active" data-range="1">24h</button>
          <button class="chart-tab" data-range="2">48h</button>
          <button class="chart-tab" data-range="7">7 days</button>
        </div>
      </div>
      <div class="chart-wrap">
        <canvas id="tideChart"></canvas>
      </div>
    </div>
  </div>
</div>

<script>
// NOAA CO-OPS API base
const API = 'https://api.tidesandcurrents.noaa.gov/api/prod/datagetter';

// Popular NOAA tide stations
const STATIONS = [
  { id: '8518750', name: 'The Battery, NY', lat: 40.7006, lon: -74.0142 },
  { id: '9414290', name: 'San Francisco, CA', lat: 37.8063, lon: -122.4659 },
  { id: '8443970', name: 'Boston, MA', lat: 42.3539, lon: -71.0503 },
  { id: '8658120', name: 'Wilmington, NC', lat: 34.2275, lon: -77.9536 },
  { id: '8723214', name: 'Virginia Key, FL', lat: 25.7317, lon: -80.1617 },
  { id: '8461490', name: 'New London, CT', lat: 41.3558, lon: -72.09 },
  { id: '8574680', name: 'Baltimore, MD', lat: 39.2667, lon: -76.5783 },
  { id: '8665530', name: 'Charleston, SC', lat: 32.7817, lon: -79.925 },
  { id: '8726520', name: 'St. Petersburg, FL', lat: 27.7606, lon: -82.6269 },
  { id: '8729108', name: 'Panama City, FL', lat: 30.1522, lon: -85.6669 },
  { id: '8771341', name: 'Galveston Bay, TX', lat: 29.51, lon: -94.8917 },
  { id: '9410660', name: 'Los Angeles, CA', lat: 33.72, lon: -118.2719 },
  { id: '9447130', name: 'Seattle, WA', lat: 47.6026, lon: -122.3393 },
  { id: '9451600', name: 'Juneau, AK', lat: 58.2989, lon: -134.4117 },
  { id: '1612340', name: 'Honolulu, HI', lat: 21.3067, lon: -157.8670 },
  { id: '8531680', name: 'Sandy Hook, NJ', lat: 40.4669, lon: -74.0094 },
  { id: '8452660', name: 'Newport, RI', lat: 41.5044, lon: -71.3261 },
  { id: '8638863', name: 'Chesapeake Bay, VA', lat: 36.9667, lon: -76.1133 },
  { id: '8724580', name: 'Key West, FL', lat: 24.5508, lon: -81.8081 },
  { id: '9410170', name: 'San Diego, CA', lat: 32.7142, lon: -117.1736 },
  { id: '8545240', name: 'Philadelphia, PA', lat: 39.9333, lon: -75.1417 },
  { id: '8447930', name: 'Woods Hole, MA', lat: 41.5236, lon: -70.6714 },
  { id: '9414750', name: 'Alameda, CA', lat: 37.7717, lon: -122.2983 },
  { id: '8467150', name: 'Bridgeport, CT', lat: 41.1733, lon: -73.1817 },
  { id: '9411340', name: 'Santa Barbara, CA', lat: 34.4083, lon: -119.6856 },
  { id: '8557380', name: 'Lewes, DE', lat: 38.7828, lon: -75.1192 },
  { id: '8720218', name: 'Mayport, FL', lat: 30.3978, lon: -81.4289 },
  { id: '8770570', name: 'Sabine Pass, TX', lat: 29.7283, lon: -93.87 },
  { id: '9432780', name: 'Charleston, OR', lat: 43.345, lon: -124.322 },
  { id: '9449880', name: 'Friday Harbor, WA', lat: 48.5469, lon: -123.0106 },
];

let activeStation = STATIONS[0];
let chartRange = 1; // days
let map, markers = [], activeMarker = null;
let chartCanvas, chartCtx;

// Format date for NOAA API (yyyyMMdd HH:mm)
function fmtDate(d) {
  return d.getFullYear().toString() +
    String(d.getMonth()+1).padStart(2,'0') +
    String(d.getDate()).padStart(2,'0') + ' ' +
    String(d.getHours()).padStart(2,'0') + ':' +
    String(d.getMinutes()).padStart(2,'0');
}

function fmtDateShort(d) {
  return d.getFullYear().toString() +
    String(d.getMonth()+1).padStart(2,'0') +
    String(d.getDate()).padStart(2,'0');
}

// Fetch NOAA data
async function fetchNOAA(product, station, beginDate, endDate, extra = {}) {
  const params = new URLSearchParams({
    begin_date: beginDate,
    end_date: endDate,
    station: station,
    product: product,
    datum: 'MLLW',
    units: 'english',
    time_zone: 'lst_ldt',
    format: 'json',
    application: 'TidesAndCurrents',
    ...extra
  });
  const res = await fetch(`${API}?${params}`);
  if (!res.ok) throw new Error(`API error: ${res.status}`);
  return res.json();
}

// Init map
function initMap() {
  map = L.map('map', { zoomControl: false }).setView([38, -98], 4);
  L.control.zoom({ position: 'topright' }).addTo(map);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; CARTO',
    maxZoom: 18
  }).addTo(map);

  const icon = L.divIcon({
    className: '',
    html: '<div style="width:10px;height:10px;background:#06b6d4;border-radius:50%;border:2px solid #0a0e1a;box-shadow:0 0 8px rgba(6,182,212,0.5)"></div>',
    iconSize: [10, 10],
    iconAnchor: [5, 5]
  });

  const activeIcon = L.divIcon({
    className: '',
    html: '<div style="width:14px;height:14px;background:#22d3ee;border-radius:50%;border:2px solid #fff;box-shadow:0 0 12px rgba(34,211,238,0.7)"></div>',
    iconSize: [14, 14],
    iconAnchor: [7, 7]
  });

  STATIONS.forEach((s, i) => {
    const m = L.marker([s.lat, s.lon], { icon: i === 0 ? activeIcon : icon })
      .addTo(map)
      .bindTooltip(s.name, { direction: 'top', offset: [0, -8] });
    m.on('click', () => selectStation(i));
    markers.push(m);
  });

  activeMarker = markers[0];
}

// Station list
function renderStationList(filter = '') {
  const list = document.getElementById('stationList');
  const filtered = STATIONS.filter(s =>
    s.name.toLowerCase().includes(filter.toLowerCase()) ||
    s.id.includes(filter)
  );
  list.innerHTML = filtered.map((s, i) => {
    const idx = STATIONS.indexOf(s);
    return `<div class="station-item${s.id === activeStation.id ? ' active' : ''}" data-idx="${idx}">
      <div class="station-name">${s.name}</div>
      <div class="station-id">#${s.id}</div>
    </div>`;
  }).join('');

  list.querySelectorAll('.station-item').forEach(el => {
    el.onclick = () => selectStation(parseInt(el.dataset.idx));
  });
}

document.getElementById('searchInput').addEventListener('input', e => {
  renderStationList(e.target.value);
});

// Select station
async function selectStation(idx) {
  activeStation = STATIONS[idx];

  // Update marker icons
  const icon = L.divIcon({
    className: '',
    html: '<div style="width:10px;height:10px;background:#06b6d4;border-radius:50%;border:2px solid #0a0e1a;box-shadow:0 0 8px rgba(6,182,212,0.5)"></div>',
    iconSize: [10, 10], iconAnchor: [5, 5]
  });
  const activeIconDef = L.divIcon({
    className: '',
    html: '<div style="width:14px;height:14px;background:#22d3ee;border-radius:50%;border:2px solid #fff;box-shadow:0 0 12px rgba(34,211,238,0.7)"></div>',
    iconSize: [14, 14], iconAnchor: [7, 7]
  });

  markers.forEach((m, i) => m.setIcon(i === idx ? activeIconDef : icon));
  map.flyTo([activeStation.lat, activeStation.lon], 8, { duration: 1 });
  renderStationList(document.getElementById('searchInput').value);
  loadStationData();
}

// Load data for active station
async function loadStationData() {
  const now = new Date();
  const begin = new Date(now);
  begin.setDate(begin.getDate() - 1);
  const end = new Date(now);
  end.setDate(end.getDate() + chartRange);

  document.getElementById('lastUpdate').textContent = 'Loading...';

  try {
    // Fetch in parallel: water levels, predictions, hi/lo, temperature
    const [waterData, predData, hiloData, tempData] = await Promise.all([
      fetchNOAA('water_level', activeStation.id, fmtDate(begin), fmtDate(now)).catch(() => null),
      fetchNOAA('predictions', activeStation.id, fmtDate(begin), fmtDate(end), { interval: chartRange > 2 ? 'h' : '6' }).catch(() => null),
      fetchNOAA('predictions', activeStation.id, fmtDate(now), fmtDate(end), { interval: 'hilo' }).catch(() => null),
      fetchNOAA('water_temperature', activeStation.id, fmtDate(begin), fmtDate(now)).catch(() => null),
    ]);

    // Current water level
    if (waterData && waterData.data && waterData.data.length > 0) {
      const latest = waterData.data[waterData.data.length - 1];
      const prevVal = waterData.data.length > 6 ? parseFloat(waterData.data[waterData.data.length - 7].v) : null;
      const curVal = parseFloat(latest.v);
      document.getElementById('cardLevel').innerHTML = `${curVal.toFixed(2)}<span class="card-unit">ft</span>`;
      document.getElementById('cardLevelSub').textContent = `at ${latest.t.split(' ')[1]} · MLLW datum`;

      // Tide direction
      const indicator = document.getElementById('tideIndicator');
      if (prevVal !== null) {
        const rising = curVal > prevVal;
        indicator.innerHTML = `<span class="tide-arrow ${rising ? 'tide-rising' : 'tide-falling'}">${rising ? '▲' : '▼'}</span>
          <span style="color:${rising ? '#22d3ee' : '#f472b6'}">${rising ? 'Rising' : 'Falling'}</span>`;
      }
    } else {
      document.getElementById('cardLevel').innerHTML = 'N/A';
      document.getElementById('tideIndicator').innerHTML = '';
    }

    // Hi/Lo predictions
    if (hiloData && hiloData.predictions && hiloData.predictions.length > 0) {
      const nextHigh = hiloData.predictions.find(p => p.type === 'H');
      const nextLow = hiloData.predictions.find(p => p.type === 'L');
      if (nextHigh) {
        document.getElementById('cardHigh').innerHTML = `${parseFloat(nextHigh.v).toFixed(2)}<span class="card-unit">ft</span>`;
        document.getElementById('cardHighTime').textContent = formatPredTime(nextHigh.t);
      }
      if (nextLow) {
        document.getElementById('cardLow').innerHTML = `${parseFloat(nextLow.v).toFixed(2)}<span class="card-unit">ft</span>`;
        document.getElementById('cardLowTime').textContent = formatPredTime(nextLow.t);
      }
    } else {
      document.getElementById('cardHigh').innerHTML = 'N/A';
      document.getElementById('cardLow').innerHTML = 'N/A';
    }

    // Water temperature
    if (tempData && tempData.data && tempData.data.length > 0) {
      const latestTemp = tempData.data[tempData.data.length - 1];
      const tempF = parseFloat(latestTemp.v);
      const tempC = ((tempF - 32) * 5 / 9).toFixed(1);
      document.getElementById('cardTemp').innerHTML = `${tempF.toFixed(1)}<span class="card-unit">°F</span>`;
      document.getElementById('cardTempSub').textContent = `${tempC}°C`;
    } else {
      document.getElementById('cardTemp').innerHTML = 'N/A';
      document.getElementById('cardTempSub').textContent = 'Not available';
    }

    // Draw chart
    drawChart(waterData, predData, hiloData);

    document.getElementById('lastUpdate').textContent = `Updated ${new Date().toLocaleTimeString()}`;
  } catch (err) {
    console.error(err);
    document.getElementById('lastUpdate').textContent = 'Error loading data';
  }
}

function formatPredTime(t) {
  const d = new Date(t.replace(' ', 'T'));
  const now = new Date();
  const diff = d - now;
  const hrs = Math.floor(diff / 3600000);
  const mins = Math.floor((diff % 3600000) / 60000);
  const timeStr = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  if (hrs > 0) return `${timeStr} (in ${hrs}h ${mins}m)`;
  if (mins > 0) return `${timeStr} (in ${mins}m)`;
  return timeStr;
}

// Chart
function drawChart(waterData, predData, hiloData) {
  const canvas = document.getElementById('tideChart');
  const rect = canvas.parentElement.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width = rect.width * dpr;
  canvas.height = (rect.height - 32) * dpr;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = (rect.height - 32) + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const W = rect.width, H = rect.height - 32;
  const pad = { top: 20, right: 20, bottom: 40, left: 55 };
  const cw = W - pad.left - pad.right;
  const ch = H - pad.top - pad.bottom;

  ctx.clearRect(0, 0, W, H);

  // Collect all data points
  const observed = [];
  const predicted = [];
  const hilos = [];

  if (waterData && waterData.data) {
    waterData.data.forEach(d => {
      if (d.v) observed.push({ t: new Date(d.t.replace(' ', 'T')), v: parseFloat(d.v) });
    });
  }
  if (predData && predData.predictions) {
    predData.predictions.forEach(d => {
      predicted.push({ t: new Date(d.t.replace(' ', 'T')), v: parseFloat(d.v) });
    });
  }
  if (hiloData && hiloData.predictions) {
    hiloData.predictions.forEach(d => {
      hilos.push({ t: new Date(d.t.replace(' ', 'T')), v: parseFloat(d.v), type: d.type });
    });
  }

  const all = [...observed, ...predicted];
  if (all.length === 0) {
    ctx.fillStyle = '#64748b';
    ctx.font = '14px Inter, system-ui';
    ctx.textAlign = 'center';
    ctx.fillText('No data available for this station', W / 2, H / 2);
    return;
  }

  const tMin = Math.min(...all.map(d => d.t.getTime()));
  const tMax = Math.max(...all.map(d => d.t.getTime()));
  const vMin = Math.min(...all.map(d => d.v)) - 0.5;
  const vMax = Math.max(...all.map(d => d.v)) + 0.5;

  const x = t => pad.left + ((t - tMin) / (tMax - tMin)) * cw;
  const y = v => pad.top + ch - ((v - vMin) / (vMax - vMin)) * ch;

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;
  const ySteps = 6;
  for (let i = 0; i <= ySteps; i++) {
    const yy = pad.top + (ch / ySteps) * i;
    ctx.beginPath(); ctx.moveTo(pad.left, yy); ctx.lineTo(W - pad.right, yy); ctx.stroke();
    const val = vMax - (i / ySteps) * (vMax - vMin);
    ctx.fillStyle = '#64748b';
    ctx.font = '11px Inter, system-ui';
    ctx.textAlign = 'right';
    ctx.fillText(val.toFixed(1) + ' ft', pad.left - 8, yy + 4);
  }

  // Time labels
  const timeSpan = tMax - tMin;
  const hourMs = 3600000;
  let timeStep = 6 * hourMs;
  if (timeSpan > 4 * 86400000) timeStep = 24 * hourMs;
  else if (timeSpan > 2 * 86400000) timeStep = 12 * hourMs;

  const firstLabel = new Date(Math.ceil(tMin / timeStep) * timeStep);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#64748b';
  ctx.font = '10px Inter, system-ui';
  for (let t = firstLabel.getTime(); t <= tMax; t += timeStep) {
    const xx = x(t);
    ctx.beginPath(); ctx.moveTo(xx, pad.top); ctx.lineTo(xx, H - pad.bottom); ctx.stroke();
    const d = new Date(t);
    const label = d.toLocaleDateString([], { month: 'short', day: 'numeric' }) + '\n' +
      d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    const parts = label.split('\n');
    ctx.fillText(parts[1], xx, H - pad.bottom + 14);
    ctx.fillText(parts[0], xx, H - pad.bottom + 26);
  }

  // "Now" line
  const now = Date.now();
  if (now >= tMin && now <= tMax) {
    const nx = x(now);
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.moveTo(nx, pad.top); ctx.lineTo(nx, H - pad.bottom); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#94a3b8';
    ctx.font = '10px Inter, system-ui';
    ctx.textAlign = 'center';
    ctx.fillText('Now', nx, pad.top - 6);
  }

  // Prediction line
  if (predicted.length > 1) {
    ctx.strokeStyle = 'rgba(6,182,212,0.3)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([6, 4]);
    ctx.beginPath();
    predicted.forEach((d, i) => {
      i === 0 ? ctx.moveTo(x(d.t.getTime()), y(d.v)) : ctx.lineTo(x(d.t.getTime()), y(d.v));
    });
    ctx.stroke();
    ctx.setLineDash([]);

    // Prediction fill
    ctx.fillStyle = 'rgba(6,182,212,0.05)';
    ctx.beginPath();
    ctx.moveTo(x(predicted[0].t.getTime()), y(vMin));
    predicted.forEach(d => ctx.lineTo(x(d.t.getTime()), y(d.v)));
    ctx.lineTo(x(predicted[predicted.length-1].t.getTime()), y(vMin));
    ctx.fill();
  }

  // Observed line (gradient)
  if (observed.length > 1) {
    const grad = ctx.createLinearGradient(0, pad.top, 0, H - pad.bottom);
    grad.addColorStop(0, '#22d3ee');
    grad.addColorStop(1, '#06b6d4');
    ctx.strokeStyle = grad;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    observed.forEach((d, i) => {
      i === 0 ? ctx.moveTo(x(d.t.getTime()), y(d.v)) : ctx.lineTo(x(d.t.getTime()), y(d.v));
    });
    ctx.stroke();

    // Fill under observed
    const fillGrad = ctx.createLinearGradient(0, pad.top, 0, H - pad.bottom);
    fillGrad.addColorStop(0, 'rgba(6,182,212,0.15)');
    fillGrad.addColorStop(1, 'rgba(6,182,212,0.02)');
    ctx.fillStyle = fillGrad;
    ctx.beginPath();
    ctx.moveTo(x(observed[0].t.getTime()), y(vMin));
    observed.forEach(d => ctx.lineTo(x(d.t.getTime()), y(d.v)));
    ctx.lineTo(x(observed[observed.length-1].t.getTime()), y(vMin));
    ctx.fill();
  }

  // Hi/Lo markers
  hilos.forEach(d => {
    const px = x(d.t.getTime()), py = y(d.v);
    const isHigh = d.type === 'H';
    ctx.fillStyle = isHigh ? '#22d3ee' : '#f472b6';
    ctx.beginPath();
    ctx.arc(px, py, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#0a0e1a';
    ctx.beginPath();
    ctx.arc(px, py, 2.5, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = isHigh ? '#22d3ee' : '#f472b6';
    ctx.font = 'bold 10px Inter, system-ui';
    ctx.textAlign = 'center';
    ctx.fillText(`${d.v.toFixed(1)}`, px, isHigh ? py - 10 : py + 16);
    ctx.fillStyle = '#64748b';
    ctx.font = '9px Inter, system-ui';
    ctx.fillText(d.t.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }), px, isHigh ? py - 22 : py + 27);
  });

  // Legend
  ctx.font = '11px Inter, system-ui';
  const legendY = pad.top + 12;
  // Observed
  ctx.strokeStyle = '#06b6d4'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(W - pad.right - 180, legendY); ctx.lineTo(W - pad.right - 160, legendY); ctx.stroke();
  ctx.fillStyle = '#94a3b8'; ctx.textAlign = 'left';
  ctx.fillText('Observed', W - pad.right - 155, legendY + 4);
  // Predicted
  ctx.strokeStyle = 'rgba(6,182,212,0.4)'; ctx.setLineDash([4,3]);
  ctx.beginPath(); ctx.moveTo(W - pad.right - 90, legendY); ctx.lineTo(W - pad.right - 70, legendY); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillText('Predicted', W - pad.right - 65, legendY + 4);
}

// Chart tabs
document.querySelectorAll('.chart-tab').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.chart-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    chartRange = parseInt(btn.dataset.range);
    loadStationData();
  };
});

// Resize handler
window.addEventListener('resize', () => {
  if (activeStation) loadStationData();
});

// Init
initMap();
renderStationList();
loadStationData();

// Auto-refresh every 6 minutes
setInterval(loadStationData, 360000);
</script>
</body>
</html>
