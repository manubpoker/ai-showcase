        { file: "faure-berceuse-piano.mid", title: "Berceuse (Dolly Suite)", composer: "Faure" },
        { file: "massenet-meditation-piano.mid", title: "Meditation from Thais", composer: "Massenet" },
        { file: "mendelssohn-song-without-words-6.mid", title: "Song Without Words No. 6", composer: "Mendelssohn" },
        { file: "mendelssohn-song-without-words-34.mid", title: "Song Without Words No. 34", composer: "Mendelssohn" },
        { file: "mussorgsky-promenade.mid", title: "Promenade (Pictures)", composer: "Mussorgsky" },
        { file: "petzold-minuet-g-major.mid", title: "Minuet in G Major", composer: "Petzold" },
        { file: "petzold-minuet-g-minor.mid", title: "Minuet in G Minor", composer: "Petzold" },
        { file: "earle-of-salisbury.mid", title: "The Earle of Salisbury", composer: "Byrd" },
        { file: "bumbleb.mid", title: "Flight of the Bumblebee", composer: "Rimsky-Korsakov" },
        { file: "Find My Way (Instrumental).mid", title: "Find My Way", composer: "Instrumental" },
      ];

      const overlay = document.getElementById('song-library-overlay');
      const list = document.getElementById('song-library-list');
      const search = document.getElementById('song-library-search');
      const closeBtn = document.getElementById('song-library-close');

      function renderSongs(filter) {
        const q = (filter || '').toLowerCase();
        const filtered = SONGS.filter(s =>
          s.title.toLowerCase().includes(q) || s.composer.toLowerCase().includes(q)
        );
        list.innerHTML = filtered.map(s => `
          <div class="song-item" data-file="${s.file}">
            <div class="song-icon">&#9835;</div>
            <div>
              <div>${s.title}</div>
              <span class="song-composer">${s.composer}</span>
            </div>
          </div>
        `).join('');
      }

      function openLibrary() {
        renderSongs('');
        search.value = '';
        overlay.classList.add('open');
        search.focus();
      }

      function closeLibrary() {
        overlay.classList.remove('open');
      }

      async function loadSong(filename) {
        const item = list.querySelector(`[data-file="${CSS.escape(filename)}"]`);
        if (item) item.classList.add('loading');
        try {
          const resp = await fetch('mid/' + encodeURIComponent(filename));
          if (!resp.ok) throw new Error('Failed to fetch');
          const blob = await resp.blob();
          const file = new File([blob], filename, { type: 'audio/midi' });
          const fileInput = document.querySelector('input[type="file"][accept*=".mid"]');
          if (fileInput) {
            const dt = new DataTransfer();
            dt.items.add(file);
            fileInput.files = dt.files;
            fileInput.dispatchEvent(new Event('change', { bubbles: true }));
          }
          closeLibrary();
        } catch (e) {
          console.error('Failed to load song:', e);
          if (item) item.classList.remove('loading');
        }
      }

      search.addEventListener('input', () => renderSongs(search.value));
      closeBtn.addEventListener('click', closeLibrary);
      overlay.addEventListener('click', e => { if (e.target === overlay) closeLibrary(); });
      list.addEventListener('click', e => {
        const item = e.target.closest('.song-item');
        if (item) loadSong(item.dataset.file);
      });
      document.addEventListener('keydown', e => {
        if (e.key === 'Escape' && overlay.classList.contains('open')) closeLibrary();
      });

      // Inject Library button into the toolbar after React renders
      function injectButton() {
        const toolbar = document.querySelector('[aria-label="Upload sheet music file"]');
        if (!toolbar) return setTimeout(injectButton, 200);
        if (document.getElementById('library-btn')) return;
        const btn = document.createElement('button');
        btn.id = 'library-btn';
        btn.textContent = 'Library';
        btn.className = 'px-3 py-1.5 rounded-lg text-sm text-white/80 transition-colors flex items-center gap-1.5';
        btn.style.cssText = 'background:rgba(139,92,246,0.2);';
        btn.onmouseenter = () => btn.style.background = 'rgba(139,92,246,0.4)';
        btn.onmouseleave = () => btn.style.background = 'rgba(139,92,246,0.2)';
        btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>Library';
        btn.addEventListener('click', openLibrary);
        toolbar.parentNode.insertBefore(btn, toolbar.nextSibling);
      }
      injectButton();
    })();
