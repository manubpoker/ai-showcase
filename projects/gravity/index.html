<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gravity Lab — N-Body Gravitational Simulator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#020408;--card:rgba(8,14,24,.85);--border:rgba(255,255,255,.08);--text:#e2e8f0;--dim:#5a7494;--accent:#f59e0b;--blue:#3b82f6}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh}
canvas{display:block;position:absolute;top:0;left:0;cursor:crosshair}

.ui{position:fixed;z-index:10}

.title{top:16px;left:16px;background:var(--card);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:12px;padding:14px 18px}
.title h1{font-size:1.1rem;font-weight:700;display:flex;align-items:center;gap:8px}
.title .sub{font-size:.68rem;color:var(--dim);margin-top:4px;line-height:1.4}

.panel{top:100px;left:16px;background:var(--card);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:12px;padding:14px 18px;width:230px}
.panel h3{font-size:.72rem;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.s-row{margin-bottom:8px}
.s-row label{display:flex;justify-content:space-between;font-size:.7rem;margin-bottom:3px}
.s-row label span{color:var(--accent);font-weight:600}
input[type=range]{width:100%;height:3px;-webkit-appearance:none;background:rgba(255,255,255,.1);border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;background:var(--accent);border-radius:50%;cursor:pointer}

.btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:8px}
.btn{background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--dim);padding:6px 8px;border-radius:8px;font-size:.68rem;cursor:pointer;transition:all .2s;font-family:inherit;text-align:center}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.active{background:rgba(245,158,11,.15);border-color:var(--accent);color:var(--accent)}
.btn.wide{grid-column:1/-1}
.btn.danger{color:#f87171}.btn.danger:hover{border-color:#f87171;color:#f87171}

.presets{top:16px;right:16px;background:var(--card);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:12px;padding:14px 18px;width:180px}
.preset-list{display:flex;flex-direction:column;gap:5px}

.info{bottom:16px;left:16px;background:var(--card);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:12px;padding:10px 16px;font-size:.72rem}
.info-grid{display:grid;grid-template-columns:auto auto;gap:3px 14px}
.info-grid .lbl{color:var(--dim)}
.info-grid .val{font-weight:600;font-variant-numeric:tabular-nums}

.hint{bottom:16px;right:16px;background:var(--card);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:12px;padding:10px 16px;font-size:.65rem;color:var(--dim);max-width:220px;line-height:1.5}
.hint b{color:var(--text)}

@media(max-width:700px){
  .panel,.presets{display:none}
  .hint{display:none}
}
</style>
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-5HPMN4CHL3"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-5HPMN4CHL3');</script>
</head>
<body>
<canvas id="c"></canvas>

<div class="ui title">
  <h1><span style="font-size:1.3rem">🪐</span> Gravity Lab</h1>
  <div class="sub">N-Body Gravitational Simulator</div>
</div>

<div class="ui panel">
  <h3>Physics</h3>
  <div class="s-row"><label>Gravity <span id="vG">1.0</span></label><input type="range" id="sG" min="1" max="200" value="50"></div>
  <div class="s-row"><label>Time Scale <span id="vTime">1.0x</span></label><input type="range" id="sTime" min="1" max="100" value="25"></div>
  <div class="s-row"><label>Trail Length <span id="vTrail">200</span></label><input type="range" id="sTrail" min="0" max="500" value="200"></div>
  <div class="s-row"><label>Softening <span id="vSoft">5.0</span></label><input type="range" id="sSoft" min="1" max="50" value="10"></div>

  <h3 style="margin-top:12px">Display</h3>
  <div class="btn-grid">
    <button class="btn active" id="bTrails" onclick="toggleOpt('trails')">Trails</button>
    <button class="btn active" id="bGlow" onclick="toggleOpt('glow')">Glow</button>
    <button class="btn active" id="bMerge" onclick="toggleOpt('merge')">Merge</button>
    <button class="btn active" id="bVectors" onclick="toggleOpt('vectors')">Vectors</button>
    <button class="btn wide danger" onclick="clearAll()">Clear All</button>
  </div>
</div>

<div class="ui presets">
  <h3 style="font-size:.72rem;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">Presets</h3>
  <div class="preset-list">
    <button class="btn" onclick="loadPreset('solar')">Solar System</button>
    <button class="btn" onclick="loadPreset('binary')">Binary Stars</button>
    <button class="btn" onclick="loadPreset('figure8')">Figure-8</button>
    <button class="btn" onclick="loadPreset('galaxy')">Galaxy</button>
    <button class="btn" onclick="loadPreset('chaos')">Chaos</button>
    <button class="btn" onclick="loadPreset('dance')">Dance of 5</button>
  </div>
</div>

<div class="ui info">
  <div class="info-grid">
    <span class="lbl">Bodies:</span><span class="val" id="infoN">0</span>
    <span class="lbl">Total Mass:</span><span class="val" id="infoMass">0</span>
    <span class="lbl">Energy:</span><span class="val" id="infoEnergy">0</span>
    <span class="lbl">FPS:</span><span class="val" id="infoFps">60</span>
  </div>
</div>

<div class="ui hint">
  <b>Click</b> to spawn (hold longer = bigger mass)<br>
  <b>Drag</b> to set velocity<br>
  <b>Scroll</b> to zoom<br>
  <b>Right-drag</b> to pan
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H, dpr;
function resize() {
  dpr = Math.min(devicePixelRatio, 2);
  W = innerWidth; H = innerHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// State
let bodies = [];
let G = 1.0, timeScale = 1.0, trailLen = 200, softening = 5.0;
let showTrails = true, showGlow = true, doMerge = true, showVectors = true;
let camX = 0, camY = 0, camZoom = 1;

// Colors by mass
function bodyColor(mass) {
  if (mass > 500) return '#fbbf24';     // Star gold
  if (mass > 200) return '#f97316';     // Orange giant
  if (mass > 80)  return '#ef4444';     // Red
  if (mass > 30)  return '#3b82f6';     // Blue
  if (mass > 10)  return '#22c55e';     // Green
  if (mass > 3)   return '#06b6d4';     // Cyan
  return '#94a3b8';                      // Small grey
}

function bodyRadius(mass) {
  return Math.max(2, Math.pow(mass, 0.38) * 1.2);
}

class Body {
  constructor(x, y, vx, vy, mass) {
    this.x = x; this.y = y;
    this.vx = vx; this.vy = vy;
    this.mass = mass;
    this.trail = [];
    this.alive = true;
  }
}

// Spawn interaction
let spawning = false, spawnStart = 0, spawnX = 0, spawnY = 0;
let panning = false, panStartX = 0, panStartY = 0, panCamX = 0, panCamY = 0;
let mouseX = 0, mouseY = 0;

function screenToWorld(sx, sy) {
  return [(sx - W/2) / camZoom + camX, (sy - H/2) / camZoom + camY];
}

canvas.addEventListener('pointerdown', e => {
  if (e.button === 2 || e.button === 1) {
    panning = true;
    panStartX = e.clientX; panStartY = e.clientY;
    panCamX = camX; panCamY = camY;
    canvas.setPointerCapture(e.pointerId);
    return;
  }
  spawning = true;
  spawnStart = performance.now();
  [spawnX, spawnY] = screenToWorld(e.clientX, e.clientY);
  mouseX = e.clientX; mouseY = e.clientY;
  canvas.setPointerCapture(e.pointerId);
});

canvas.addEventListener('pointermove', e => {
  mouseX = e.clientX; mouseY = e.clientY;
  if (panning) {
    camX = panCamX - (e.clientX - panStartX) / camZoom;
    camY = panCamY - (e.clientY - panStartY) / camZoom;
  }
});

canvas.addEventListener('pointerup', e => {
  if (panning) { panning = false; return; }
  if (!spawning) return;
  spawning = false;
  const holdTime = (performance.now() - spawnStart) / 1000;
  const mass = Math.max(1, Math.min(1000, holdTime * holdTime * 50));
  const [mx, my] = screenToWorld(e.clientX, e.clientY);
  const vx = (spawnX - mx) * 0.5;
  const vy = (spawnY - my) * 0.5;
  bodies.push(new Body(spawnX, spawnY, vx, vy, mass));
});

canvas.addEventListener('contextmenu', e => e.preventDefault());

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.9 : 1.1;
  camZoom = Math.max(0.05, Math.min(20, camZoom * factor));
}, { passive: false });

// Settings
const sG = document.getElementById('sG');
const sTime = document.getElementById('sTime');
const sTrail = document.getElementById('sTrail');
const sSoft = document.getElementById('sSoft');

function updateSettings() {
  G = (sG.value / 50);
  timeScale = (sTime.value / 25);
  trailLen = parseInt(sTrail.value);
  softening = sSoft.value / 2;
  document.getElementById('vG').textContent = G.toFixed(2);
  document.getElementById('vTime').textContent = timeScale.toFixed(1) + 'x';
  document.getElementById('vTrail').textContent = trailLen;
  document.getElementById('vSoft').textContent = softening.toFixed(1);
}
[sG, sTime, sTrail, sSoft].forEach(s => s.addEventListener('input', updateSettings));
updateSettings();

function toggleOpt(name) {
  if (name === 'trails') { showTrails = !showTrails; document.getElementById('bTrails').classList.toggle('active', showTrails); }
  if (name === 'glow') { showGlow = !showGlow; document.getElementById('bGlow').classList.toggle('active', showGlow); }
  if (name === 'merge') { doMerge = !doMerge; document.getElementById('bMerge').classList.toggle('active', doMerge); }
  if (name === 'vectors') { showVectors = !showVectors; document.getElementById('bVectors').classList.toggle('active', showVectors); }
}

function clearAll() { bodies = []; }

// Presets
function loadPreset(name) {
  bodies = [];
  camX = 0; camY = 0; camZoom = 1;

  if (name === 'solar') {
    bodies.push(new Body(0, 0, 0, 0, 800));
    const planets = [
      { d: 80, m: 3, s: 2.8 },
      { d: 120, m: 5, s: 2.2 },
      { d: 170, m: 8, s: 1.8 },
      { d: 230, m: 4, s: 1.5 },
      { d: 310, m: 40, s: 1.2 },
      { d: 400, m: 30, s: 1.0 },
      { d: 500, m: 15, s: 0.85 },
    ];
    planets.forEach(p => {
      const a = Math.random() * Math.PI * 2;
      const v = p.s * Math.sqrt(G * 800 / p.d) * 0.3;
      bodies.push(new Body(
        Math.cos(a) * p.d, Math.sin(a) * p.d,
        -Math.sin(a) * v, Math.cos(a) * v, p.m
      ));
    });
    camZoom = 0.6;
  }

  if (name === 'binary') {
    const sep = 80, v = 1.2;
    bodies.push(new Body(-sep/2, 0, 0, -v, 300));
    bodies.push(new Body(sep/2, 0, 0, v, 300));
    // Some orbiting particles
    for (let i = 0; i < 20; i++) {
      const a = Math.random() * Math.PI * 2;
      const d = 150 + Math.random() * 200;
      const spd = Math.sqrt(G * 600 / d) * 0.25;
      bodies.push(new Body(
        Math.cos(a) * d, Math.sin(a) * d,
        -Math.sin(a) * spd, Math.cos(a) * spd, 0.5 + Math.random() * 2
      ));
    }
  }

  if (name === 'figure8') {
    // Cris Moore's famous 3-body figure-8 solution (scaled)
    const s = 60;
    bodies.push(new Body(-s, 0, 0.347 * 1.5, 0.533 * 1.5, 100));
    bodies.push(new Body(s, 0, 0.347 * 1.5, 0.533 * 1.5, 100));
    bodies.push(new Body(0, 0, -0.694 * 1.5, -1.066 * 1.5, 100));
    sG.value = 80;
    sSoft.value = 4;
    updateSettings();
  }

  if (name === 'galaxy') {
    bodies.push(new Body(0, 0, 0, 0, 1000));
    for (let i = 0; i < 150; i++) {
      const d = 40 + Math.random() * 350;
      const a = Math.random() * Math.PI * 2;
      const spd = Math.sqrt(G * 1000 / d) * (0.25 + Math.random() * 0.08);
      bodies.push(new Body(
        Math.cos(a) * d + (Math.random() - 0.5) * 20,
        Math.sin(a) * d + (Math.random() - 0.5) * 20,
        -Math.sin(a) * spd + (Math.random() - 0.5) * 0.1,
        Math.cos(a) * spd + (Math.random() - 0.5) * 0.1,
        0.3 + Math.random() * 2
      ));
    }
    camZoom = 0.5;
  }

  if (name === 'chaos') {
    for (let i = 0; i < 12; i++) {
      const a = (i / 12) * Math.PI * 2;
      const d = 100;
      bodies.push(new Body(
        Math.cos(a) * d, Math.sin(a) * d,
        (Math.random() - 0.5) * 2, (Math.random() - 0.5) * 2,
        30 + Math.random() * 70
      ));
    }
  }

  if (name === 'dance') {
    const r = 80;
    for (let i = 0; i < 5; i++) {
      const a = (i / 5) * Math.PI * 2;
      const v = 1.3;
      bodies.push(new Body(
        Math.cos(a) * r, Math.sin(a) * r,
        -Math.sin(a) * v, Math.cos(a) * v, 80
      ));
    }
  }
}

// Physics — Velocity Verlet integration
function step(dt) {
  const n = bodies.length;
  if (n === 0) return;

  // Compute accelerations
  const ax = new Float64Array(n);
  const ay = new Float64Array(n);

  for (let i = 0; i < n; i++) {
    for (let j = i + 1; j < n; j++) {
      const bi = bodies[i], bj = bodies[j];
      const dx = bj.x - bi.x;
      const dy = bj.y - bi.y;
      const distSq = dx * dx + dy * dy + softening * softening;
      const dist = Math.sqrt(distSq);
      const force = G * bi.mass * bj.mass / distSq;
      const fx = force * dx / dist;
      const fy = force * dy / dist;
      ax[i] += fx / bi.mass;
      ay[i] += fy / bi.mass;
      ax[j] -= fx / bj.mass;
      ay[j] -= fy / bj.mass;

      // Merge check
      if (doMerge && dist < bodyRadius(bi.mass) + bodyRadius(bj.mass)) {
        const totalMass = bi.mass + bj.mass;
        bi.x = (bi.x * bi.mass + bj.x * bj.mass) / totalMass;
        bi.y = (bi.y * bi.mass + bj.y * bj.mass) / totalMass;
        bi.vx = (bi.vx * bi.mass + bj.vx * bj.mass) / totalMass;
        bi.vy = (bi.vy * bi.mass + bj.vy * bj.mass) / totalMass;
        bi.mass = totalMass;
        bj.alive = false;
      }
    }
  }

  // Integrate
  for (let i = 0; i < n; i++) {
    const b = bodies[i];
    if (!b.alive) continue;
    b.vx += ax[i] * dt;
    b.vy += ay[i] * dt;
    b.x += b.vx * dt;
    b.y += b.vy * dt;

    // Trail
    b.trail.push({ x: b.x, y: b.y });
    if (b.trail.length > trailLen) b.trail.shift();
  }

  // Remove dead
  bodies = bodies.filter(b => b.alive);
}

// Render
function worldToScreen(wx, wy) {
  return [(wx - camX) * camZoom + W/2, (wy - camY) * camZoom + H/2];
}

function render() {
  ctx.fillStyle = 'rgba(2,4,8,0.15)';
  ctx.fillRect(0, 0, W, H);

  // Stars background (static)
  if (!render.stars) {
    render.stars = [];
    for (let i = 0; i < 200; i++) {
      render.stars.push({
        x: Math.random() * W, y: Math.random() * H,
        r: Math.random() * 1.2, a: Math.random() * 0.5 + 0.2
      });
    }
  }
  ctx.fillStyle = '#fff';
  for (const s of render.stars) {
    ctx.globalAlpha = s.a * (0.5 + 0.5 * Math.sin(performance.now() * 0.001 + s.x));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Clear properly for crisp rendering
  // (trails create natural fade with the semi-transparent fill above)

  // Trails
  if (showTrails) {
    for (const b of bodies) {
      if (b.trail.length < 2) continue;
      const color = bodyColor(b.mass);
      ctx.lineWidth = Math.max(0.5, bodyRadius(b.mass) * 0.3 * camZoom);
      for (let i = 1; i < b.trail.length; i++) {
        const alpha = (i / b.trail.length) * 0.6;
        ctx.strokeStyle = color;
        ctx.globalAlpha = alpha;
        const [x1, y1] = worldToScreen(b.trail[i-1].x, b.trail[i-1].y);
        const [x2, y2] = worldToScreen(b.trail[i].x, b.trail[i].y);
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
      }
    }
    ctx.globalAlpha = 1;
  }

  // Bodies
  for (const b of bodies) {
    const [sx, sy] = worldToScreen(b.x, b.y);
    const r = bodyRadius(b.mass) * camZoom;
    const color = bodyColor(b.mass);

    // Glow
    if (showGlow && r > 2) {
      const grad = ctx.createRadialGradient(sx, sy, 0, sx, sy, r * 4);
      grad.addColorStop(0, color + '40');
      grad.addColorStop(1, color + '00');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(sx, sy, r * 4, 0, Math.PI * 2);
      ctx.fill();
    }

    // Body
    const bGrad = ctx.createRadialGradient(sx - r * 0.3, sy - r * 0.3, 0, sx, sy, r);
    bGrad.addColorStop(0, '#fff');
    bGrad.addColorStop(0.3, color);
    bGrad.addColorStop(1, color + '88');
    ctx.fillStyle = bGrad;
    ctx.beginPath();
    ctx.arc(sx, sy, Math.max(1.5, r), 0, Math.PI * 2);
    ctx.fill();

    // Velocity vector
    if (showVectors && r > 3) {
      const vScale = 8 * camZoom;
      ctx.strokeStyle = color + '66';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(sx, sy);
      ctx.lineTo(sx + b.vx * vScale, sy + b.vy * vScale);
      ctx.stroke();
    }
  }

  // Spawn preview
  if (spawning) {
    const holdTime = (performance.now() - spawnStart) / 1000;
    const mass = Math.max(1, Math.min(1000, holdTime * holdTime * 50));
    const r = bodyRadius(mass) * camZoom;
    const color = bodyColor(mass);
    const [sx, sy] = worldToScreen(spawnX, spawnY);

    // Growing circle
    ctx.strokeStyle = color + '88';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.arc(sx, sy, r + 4, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);

    // Body preview
    ctx.fillStyle = color + '66';
    ctx.beginPath();
    ctx.arc(sx, sy, Math.max(2, r), 0, Math.PI * 2);
    ctx.fill();

    // Velocity line
    ctx.strokeStyle = '#ffffff66';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([6, 4]);
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.lineTo(mouseX, mouseY);
    ctx.stroke();
    ctx.setLineDash([]);

    // Mass label
    ctx.fillStyle = '#fff';
    ctx.font = '11px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText(`m=${mass.toFixed(0)}`, sx, sy - r - 12);
  }
}

// Compute total energy
function totalEnergy() {
  let ke = 0, pe = 0;
  for (const b of bodies) {
    ke += 0.5 * b.mass * (b.vx * b.vx + b.vy * b.vy);
    for (const b2 of bodies) {
      if (b === b2) continue;
      const dx = b2.x - b.x, dy = b2.y - b.y;
      const dist = Math.sqrt(dx*dx + dy*dy + softening*softening);
      pe -= 0.5 * G * b.mass * b2.mass / dist;
    }
  }
  return ke + pe;
}

// Main loop
let lastT = 0, frames = 0, lastFpsT = 0, fps = 60;

function animate(t) {
  requestAnimationFrame(animate);
  const rawDt = lastT ? (t - lastT) / 1000 : 0.016;
  lastT = t;
  const dt = Math.min(rawDt, 0.033) * timeScale;

  // Substeps for stability
  const substeps = Math.max(1, Math.ceil(dt / 0.008));
  const subDt = dt / substeps;
  for (let s = 0; s < substeps; s++) step(subDt);

  render();

  // FPS & info
  frames++;
  if (t - lastFpsT > 500) {
    fps = Math.round(frames / ((t - lastFpsT) / 1000));
    lastFpsT = t; frames = 0;
  }
  document.getElementById('infoN').textContent = bodies.length;
  document.getElementById('infoMass').textContent = bodies.reduce((s, b) => s + b.mass, 0).toFixed(0);
  document.getElementById('infoFps').textContent = fps;

  // Energy (compute less frequently)
  if (Math.floor(t / 300) !== Math.floor((t - 16) / 300)) {
    const e = totalEnergy();
    document.getElementById('infoEnergy').textContent =
      (e >= 0 ? '+' : '') + (Math.abs(e) > 9999 ? (e/1000).toFixed(0) + 'K' : e.toFixed(0));
  }
}

// Start with solar system preset
loadPreset('solar');
requestAnimationFrame(animate);
</script>
</body>
</html>
