<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio Globe</title>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-5HPMN4CHL3"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-5HPMN4CHL3');</script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0d14;--card:#111827;--border:#1c2333;--text:#e2e8f0;--muted:#64748b;--accent:#8b5cf6;--accent2:#a78bfa;--playing:#22c55e;--hover:#6366f1}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow:hidden}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--border);background:rgba(17,24,39,0.92);backdrop-filter:blur(12px);position:relative;z-index:200}
.header-left{display:flex;align-items:center;gap:12px}
.header h1{font-size:1.05rem;font-weight:700}
.header h1 span{background:linear-gradient(135deg,#8b5cf6,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .sub{font-size:0.62rem;color:var(--muted)}
.station-count{font-size:0.7rem;color:var(--muted);background:rgba(139,92,246,0.12);padding:3px 10px;border-radius:12px;border:1px solid rgba(139,92,246,0.2)}

/* Layout */
.layout{display:grid;grid-template-columns:1fr 340px;height:calc(100vh - 49px)}
.map-area{position:relative}
#map{width:100%;height:100%}

/* Now playing bar */
.now-playing{position:absolute;bottom:0;left:0;right:0;z-index:500;background:rgba(17,24,39,0.95);border-top:1px solid var(--border);backdrop-filter:blur(16px);padding:10px 20px;display:flex;align-items:center;gap:14px;transform:translateY(100%);transition:transform 0.3s}
.now-playing.visible{transform:translateY(0)}
.np-art{width:44px;height:44px;border-radius:8px;background:linear-gradient(135deg,#8b5cf6,#06b6d4);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;position:relative;overflow:hidden}
.np-art .eq{display:flex;gap:2px;align-items:flex-end;height:18px}
.np-art .eq span{width:3px;background:#fff;border-radius:1px;animation:eqBar 0.8s ease-in-out infinite alternate}
.np-art .eq span:nth-child(2){animation-delay:0.2s;animation-duration:0.6s}
.np-art .eq span:nth-child(3){animation-delay:0.4s;animation-duration:0.9s}
.np-art .eq span:nth-child(4){animation-delay:0.1s;animation-duration:0.7s}
@keyframes eqBar{0%{height:3px}100%{height:16px}}
.np-art.paused .eq span{animation-play-state:paused}
.np-info{flex:1;min-width:0}
.np-name{font-size:0.82rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.np-detail{font-size:0.65rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.np-controls{display:flex;align-items:center;gap:10px}
.np-btn{width:36px;height:36px;border-radius:50%;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:#ccc;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.np-btn:hover{background:rgba(255,255,255,0.1);color:#fff}
.np-btn.play{width:40px;height:40px;background:var(--accent);border-color:var(--accent);color:#fff;font-size:1.1rem}
.np-btn.play:hover{background:var(--hover)}
.np-volume{display:flex;align-items:center;gap:6px}
.np-volume input{-webkit-appearance:none;width:80px;height:3px;border-radius:2px;background:rgba(255,255,255,0.1);outline:none}
.np-volume input::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:#fff;cursor:pointer}
.vol-icon{font-size:0.85rem;color:var(--muted)}

/* Sidebar */
.sidebar{border-left:1px solid var(--border);display:flex;flex-direction:column;background:var(--card);overflow:hidden}
.search-area{padding:10px 14px;border-bottom:1px solid var(--border)}
.search-area input{width:100%;padding:7px 12px;border:1px solid var(--border);border-radius:8px;background:rgba(255,255,255,0.04);color:var(--text);font-size:0.78rem;outline:none}
.search-area input:focus{border-color:var(--accent)}

.filter-row{display:flex;gap:5px;padding:8px 14px;border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0}
.filter-row::-webkit-scrollbar{display:none}
.tag{padding:3px 10px;border:1px solid var(--border);border-radius:14px;background:transparent;color:var(--muted);font-size:0.62rem;cursor:pointer;white-space:nowrap;transition:all 0.2s;flex-shrink:0}
.tag:hover{color:#fff;border-color:#555}
.tag.active{background:rgba(139,92,246,0.15);border-color:rgba(139,92,246,0.3);color:var(--accent2)}

.country-section{padding:8px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.country-label{font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:4px}
.country-name{font-size:0.9rem;font-weight:600}

.station-list{flex:1;overflow-y:auto}
.station-item{padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s;display:flex;align-items:center;gap:10px}
.station-item:hover{background:rgba(139,92,246,0.06)}
.station-item.active{background:rgba(34,197,94,0.08);border-left:3px solid var(--playing)}
.st-icon{width:32px;height:32px;border-radius:6px;background:rgba(139,92,246,0.12);display:flex;align-items:center;justify-content:center;font-size:0.8rem;flex-shrink:0}
.st-info{flex:1;min-width:0}
.st-name{font-size:0.78rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.st-tags{font-size:0.6rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.st-bitrate{font-size:0.6rem;color:var(--muted);flex-shrink:0}
.st-play{width:26px;height:26px;border-radius:50%;border:1px solid rgba(255,255,255,0.1);background:transparent;color:#aaa;font-size:0.65rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s}
.st-play:hover{background:var(--accent);border-color:var(--accent);color:#fff}

.loading-msg{padding:30px;text-align:center;color:#475569;font-size:0.78rem}

@media(max-width:800px){
  .layout{grid-template-columns:1fr;grid-template-rows:50vh 1fr}
  .sidebar{border-left:none;border-top:1px solid var(--border)}
  .np-volume{display:none}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div>
      <h1><span>Radio Globe</span></h1>
      <div class="sub">Live internet radio from around the world</div>
    </div>
  </div>
  <div class="station-count" id="stationCount">Loading...</div>
</div>

<div class="layout">
  <div class="map-area">
    <div id="map"></div>
    <div class="now-playing" id="nowPlaying">
      <div class="np-art" id="npArt">
        <div class="eq"><span></span><span></span><span></span><span></span></div>
      </div>
      <div class="np-info">
        <div class="np-name" id="npName">—</div>
        <div class="np-detail" id="npDetail">—</div>
      </div>
      <div class="np-controls">
        <div class="np-btn" id="btnPrev" title="Previous">⏮</div>
        <div class="np-btn play" id="btnPlay" title="Play/Pause">▶</div>
        <div class="np-btn" id="btnNext" title="Next">⏭</div>
      </div>
      <div class="np-volume">
        <span class="vol-icon">🔊</span>
        <input type="range" id="volume" min="0" max="1" step="0.05" value="0.7">
      </div>
    </div>
  </div>

  <div class="sidebar">
    <div class="search-area">
      <input type="text" id="searchInput" placeholder="Search stations, genres, countries...">
    </div>
    <div class="filter-row" id="filterRow">
      <div class="tag active" data-tag="">All</div>
      <div class="tag" data-tag="pop">Pop</div>
      <div class="tag" data-tag="rock">Rock</div>
      <div class="tag" data-tag="jazz">Jazz</div>
      <div class="tag" data-tag="classical">Classical</div>
      <div class="tag" data-tag="electronic">Electronic</div>
      <div class="tag" data-tag="hiphop">Hip Hop</div>
      <div class="tag" data-tag="news">News</div>
      <div class="tag" data-tag="ambient">Ambient</div>
      <div class="tag" data-tag="latin">Latin</div>
      <div class="tag" data-tag="reggae">Reggae</div>
      <div class="tag" data-tag="blues">Blues</div>
      <div class="tag" data-tag="country">Country</div>
      <div class="tag" data-tag="lounge">Lounge</div>
    </div>
    <div class="country-section" id="countrySection" style="display:none">
      <div class="country-label">Selected Region</div>
      <div class="country-name" id="countryName">—</div>
    </div>
    <div class="station-list" id="stationList">
      <div class="loading-msg">Click a region on the map or search...</div>
    </div>
  </div>
</div>

<script>
const API_BASE = 'https://de1.api.radio-browser.info/json';

let allStations = [];
let displayedStations = [];
let currentStation = null;
let currentIdx = -1;
let audio = new Audio();
audio.crossOrigin = 'anonymous';
audio.volume = 0.7;
let isPlaying = false;
let activeTag = '';
let activeCountryCode = '';
let markerClusters = {};
let countryMarkers = [];

// Map
const map = L.map('map', { zoomControl: false, worldCopyJump: true }).setView([25, 10], 3);
L.control.zoom({ position: 'topright' }).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; CARTO', maxZoom: 18
}).addTo(map);

// Country centroids for map markers
const COUNTRIES = {
  US:{lat:39.8,lon:-98.5,name:'United States'},DE:{lat:51.2,lon:10.5,name:'Germany'},
  FR:{lat:46.2,lon:2.2,name:'France'},GB:{lat:55.4,lon:-3.4,name:'United Kingdom'},
  BR:{lat:-14.2,lon:-51.9,name:'Brazil'},JP:{lat:36.2,lon:138.3,name:'Japan'},
  ES:{lat:40.5,lon:-3.7,name:'Spain'},IT:{lat:41.9,lon:12.6,name:'Italy'},
  RU:{lat:61.5,lon:105.3,name:'Russia'},CA:{lat:56.1,lon:-106.3,name:'Canada'},
  AU:{lat:-25.3,lon:133.8,name:'Australia'},MX:{lat:23.6,lon:-102.6,name:'Mexico'},
  IN:{lat:20.6,lon:78.9,name:'India'},CN:{lat:35.9,lon:104.2,name:'China'},
  AR:{lat:-38.4,lon:-63.6,name:'Argentina'},NL:{lat:52.1,lon:5.3,name:'Netherlands'},
  AT:{lat:47.5,lon:14.6,name:'Austria'},CH:{lat:46.8,lon:8.2,name:'Switzerland'},
  PL:{lat:51.9,lon:19.1,name:'Poland'},SE:{lat:60.1,lon:18.6,name:'Sweden'},
  PT:{lat:39.4,lon:-8.2,name:'Portugal'},TR:{lat:39.0,lon:35.2,name:'Turkey'},
  GR:{lat:39.1,lon:21.8,name:'Greece'},CZ:{lat:49.8,lon:15.5,name:'Czech Republic'},
  RO:{lat:45.9,lon:25.0,name:'Romania'},CO:{lat:4.6,lon:-74.3,name:'Colombia'},
  CL:{lat:-35.7,lon:-71.5,name:'Chile'},PE:{lat:-9.2,lon:-75.0,name:'Peru'},
  ZA:{lat:-30.6,lon:22.9,name:'South Africa'},KR:{lat:35.9,lon:127.8,name:'South Korea'},
  ID:{lat:-0.8,lon:113.9,name:'Indonesia'},PH:{lat:12.9,lon:121.8,name:'Philippines'},
  NG:{lat:9.1,lon:8.7,name:'Nigeria'},KE:{lat:-0.0,lon:37.9,name:'Kenya'},
  EG:{lat:26.8,lon:30.8,name:'Egypt'},TH:{lat:15.9,lon:100.9,name:'Thailand'},
  UA:{lat:48.4,lon:31.2,name:'Ukraine'},NO:{lat:60.5,lon:8.5,name:'Norway'},
  FI:{lat:61.9,lon:25.7,name:'Finland'},DK:{lat:56.3,lon:9.5,name:'Denmark'},
  BE:{lat:50.5,lon:4.5,name:'Belgium'},IE:{lat:53.1,lon:-7.7,name:'Ireland'},
  NZ:{lat:-40.9,lon:174.9,name:'New Zealand'},HU:{lat:47.2,lon:19.5,name:'Hungary'},
  IL:{lat:31.0,lon:34.9,name:'Israel'},SG:{lat:1.4,lon:103.8,name:'Singapore'},
};

// Filter to HTTPS streams only (avoids CORS & mixed-content issues)
function filterSecure(stations) {
  return stations.filter(s => {
    const url = s.url_resolved || s.url || '';
    return url.startsWith('https://');
  });
}

// Fetch top stations by country
async function fetchStationsByCountry(cc) {
  const url = `${API_BASE}/stations/bycountrycodeexact/${cc}?limit=200&order=clickcount&reverse=true&hidebroken=true`;
  const res = await fetch(url);
  return filterSecure(await res.json()).slice(0, 100);
}

// Fetch by search
async function searchStations(query) {
  const url = `${API_BASE}/stations/byname/${encodeURIComponent(query)}?limit=150&order=clickcount&reverse=true&hidebroken=true`;
  const res = await fetch(url);
  return filterSecure(await res.json()).slice(0, 80);
}

// Fetch by tag
async function fetchByTag(tag) {
  const url = `${API_BASE}/stations/bytag/${encodeURIComponent(tag)}?limit=200&order=clickcount&reverse=true&hidebroken=true`;
  const res = await fetch(url);
  return filterSecure(await res.json()).slice(0, 100);
}

// Fetch top stations globally (initial load)
async function fetchTopStations() {
  const url = `${API_BASE}/stations/topclick/400?hidebroken=true`;
  const res = await fetch(url);
  return filterSecure(await res.json()).slice(0, 200);
}

// Station count
async function fetchStats() {
  try {
    const res = await fetch(`${API_BASE}/stats`);
    const data = await res.json();
    document.getElementById('stationCount').textContent = `${Number(data.stations).toLocaleString()} stations worldwide`;
  } catch(e) {
    document.getElementById('stationCount').textContent = 'Radio Browser API';
  }
}

// Create country markers on map
function createCountryMarkers(countryCounts) {
  countryMarkers.forEach(m => map.removeLayer(m));
  countryMarkers = [];

  Object.entries(COUNTRIES).forEach(([cc, info]) => {
    const count = countryCounts[cc] || 0;
    const size = Math.max(24, Math.min(50, 20 + Math.sqrt(count) * 2));
    const opacity = count > 0 ? 0.85 : 0.3;

    const icon = L.divIcon({
      className: '',
      html: `<div style="
        width:${size}px;height:${size}px;border-radius:50%;
        background:rgba(139,92,246,${count > 0 ? 0.2 : 0.06});
        border:2px solid rgba(139,92,246,${opacity});
        display:flex;align-items:center;justify-content:center;
        font-size:${size < 32 ? 8 : 10}px;font-weight:700;
        color:rgba(167,139,250,${opacity});
        font-family:Inter,system-ui;cursor:pointer;
        box-shadow:0 0 ${count > 50 ? 16 : 8}px rgba(139,92,246,${count > 50 ? 0.3 : 0.1});
        transition:all 0.2s;
      " onmouseover="this.style.transform='scale(1.15)'" onmouseout="this.style.transform='scale(1)'"
      >${count > 0 ? (count > 999 ? Math.round(count/1000)+'k' : count) : ''}</div>`,
      iconSize: [size, size],
      iconAnchor: [size/2, size/2]
    });

    const m = L.marker([info.lat, info.lon], { icon })
      .addTo(map)
      .bindTooltip(`${info.name}${count > 0 ? ` · ${count} stations` : ''}`, { direction: 'top', offset: [0, -size/2] });
    m.on('click', () => loadCountry(cc));
    countryMarkers.push(m);
  });
}

// Load country
async function loadCountry(cc) {
  activeCountryCode = cc;
  const info = COUNTRIES[cc];
  if (!info) return;

  document.getElementById('countrySection').style.display = '';
  document.getElementById('countryName').textContent = info.name;
  document.getElementById('stationList').innerHTML = '<div class="loading-msg">Loading stations...</div>';

  map.flyTo([info.lat, info.lon], 5, { duration: 1 });

  try {
    let stations = await fetchStationsByCountry(cc);
    if (activeTag) {
      stations = stations.filter(s => s.tags && s.tags.toLowerCase().includes(activeTag));
    }
    displayedStations = stations;
    renderStationList(stations);
  } catch(e) {
    document.getElementById('stationList').innerHTML = '<div class="loading-msg">Failed to load stations</div>';
  }
}

// Render station list
function renderStationList(stations) {
  const list = document.getElementById('stationList');
  if (stations.length === 0) {
    list.innerHTML = '<div class="loading-msg">No stations found</div>';
    return;
  }

  list.innerHTML = stations.map((s, i) => {
    const isActive = currentStation && currentStation.stationuuid === s.stationuuid;
    const tags = (s.tags || '').split(',').slice(0, 3).join(' · ');
    const codec = s.codec || '';
    const bitrate = s.bitrate ? `${s.bitrate}k` : '';
    return `<div class="station-item${isActive ? ' active' : ''}" data-idx="${i}">
      <div class="st-icon">📻</div>
      <div class="st-info">
        <div class="st-name">${escHtml(s.name)}</div>
        <div class="st-tags">${escHtml(tags || s.country || '')}</div>
      </div>
      <div class="st-bitrate">${codec} ${bitrate}</div>
      <button class="st-play">${isActive && isPlaying ? '⏸' : '▶'}</button>
    </div>`;
  }).join('');

  list.querySelectorAll('.station-item').forEach(el => {
    el.onclick = () => {
      const idx = parseInt(el.dataset.idx);
      playStation(stations[idx], idx);
    };
  });
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// Play station
let skipCount = 0;
const MAX_SKIPS = 5;

function playStation(station, idx) {
  if (currentStation && currentStation.stationuuid === station.stationuuid && isPlaying) {
    pauseAudio();
    return;
  }

  currentStation = station;
  currentIdx = idx;

  const streamUrl = station.url_resolved || station.url;

  // Block insecure streams on HTTPS page
  if (streamUrl && streamUrl.startsWith('http://')) {
    console.warn('Skipping insecure stream:', station.name);
    skipToNext(idx);
    return;
  }

  // Record click (helps RadioBrowser ranking)
  fetch(`${API_BASE}/url/${station.stationuuid}`).catch(()=>{});

  audio.src = streamUrl;
  audio.play().then(() => {
    isPlaying = true;
    skipCount = 0;
    updateNowPlaying();
    renderStationList(displayedStations);
  }).catch(e => {
    console.warn('Playback failed:', station.name, e.message);
    skipToNext(idx);
  });
}

function skipToNext(idx) {
  skipCount++;
  if (skipCount >= MAX_SKIPS) {
    skipCount = 0;
    console.warn('Too many failed stations, stopping auto-skip');
    isPlaying = false;
    updateNowPlaying();
    return;
  }
  if (displayedStations.length > 1) {
    const nextIdx = (idx + 1) % displayedStations.length;
    setTimeout(() => playStation(displayedStations[nextIdx], nextIdx), 300);
  }
}

function pauseAudio() {
  audio.pause();
  isPlaying = false;
  updateNowPlaying();
  renderStationList(displayedStations);
}

function updateNowPlaying() {
  const np = document.getElementById('nowPlaying');
  if (!currentStation) { np.classList.remove('visible'); return; }
  np.classList.add('visible');

  document.getElementById('npName').textContent = currentStation.name;
  document.getElementById('npDetail').textContent = [
    currentStation.country,
    currentStation.tags ? currentStation.tags.split(',').slice(0, 2).join(', ') : '',
    currentStation.bitrate ? currentStation.bitrate + 'kbps' : ''
  ].filter(Boolean).join(' · ');

  document.getElementById('btnPlay').textContent = isPlaying ? '⏸' : '▶';
  document.getElementById('npArt').classList.toggle('paused', !isPlaying);
}

// Controls
document.getElementById('btnPlay').onclick = () => {
  if (!currentStation) return;
  if (isPlaying) pauseAudio();
  else { audio.play(); isPlaying = true; updateNowPlaying(); renderStationList(displayedStations); }
};

document.getElementById('btnPrev').onclick = () => {
  if (displayedStations.length === 0) return;
  const idx = (currentIdx - 1 + displayedStations.length) % displayedStations.length;
  playStation(displayedStations[idx], idx);
};

document.getElementById('btnNext').onclick = () => {
  if (displayedStations.length === 0) return;
  const idx = (currentIdx + 1) % displayedStations.length;
  playStation(displayedStations[idx], idx);
};

document.getElementById('volume').addEventListener('input', function() {
  audio.volume = parseFloat(this.value);
});

// Auto-advance on stream end
audio.addEventListener('ended', () => {
  if (displayedStations.length > 1) {
    const idx = (currentIdx + 1) % displayedStations.length;
    playStation(displayedStations[idx], idx);
  }
});

audio.addEventListener('error', () => {
  skipToNext(currentIdx);
});

// Search
let searchTimeout;
document.getElementById('searchInput').addEventListener('input', function() {
  clearTimeout(searchTimeout);
  const q = this.value.trim();
  if (q.length < 2) return;
  searchTimeout = setTimeout(async () => {
    document.getElementById('stationList').innerHTML = '<div class="loading-msg">Searching...</div>';
    document.getElementById('countrySection').style.display = 'none';
    try {
      const stations = await searchStations(q);
      displayedStations = stations;
      renderStationList(stations);
    } catch(e) {
      document.getElementById('stationList').innerHTML = '<div class="loading-msg">Search failed</div>';
    }
  }, 400);
});

// Genre tags
document.querySelectorAll('.tag').forEach(el => {
  el.onclick = async () => {
    document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    activeTag = el.dataset.tag;

    if (activeCountryCode) {
      loadCountry(activeCountryCode);
      return;
    }

    if (!activeTag) {
      // Show top stations
      document.getElementById('stationList').innerHTML = '<div class="loading-msg">Loading top stations...</div>';
      const stations = await fetchTopStations();
      displayedStations = stations;
      renderStationList(stations);
      return;
    }

    document.getElementById('stationList').innerHTML = '<div class="loading-msg">Loading...</div>';
    try {
      const stations = await fetchByTag(activeTag);
      displayedStations = stations;
      renderStationList(stations);
    } catch(e) {
      document.getElementById('stationList').innerHTML = '<div class="loading-msg">Failed to load</div>';
    }
  };
});

// Initial load
async function init() {
  fetchStats();

  // Load top stations
  try {
    const stations = await fetchTopStations();
    displayedStations = stations;
    renderStationList(stations);

    // Build country counts from top stations
    const counts = {};
    stations.forEach(s => {
      if (s.countrycode) counts[s.countrycode] = (counts[s.countrycode] || 0) + 1;
    });

    // Also fetch real station counts per country
    try {
      const res = await fetch(`${API_BASE}/countries?order=stationcount&reverse=true&hidebroken=true`);
      const countries = await res.json();
      countries.forEach(c => {
        if (c.iso_3166_1) counts[c.iso_3166_1] = c.stationcount;
      });
    } catch(e) {}

    createCountryMarkers(counts);
  } catch(e) {
    document.getElementById('stationList').innerHTML = '<div class="loading-msg">Failed to load stations. Please refresh.</div>';
  }
}

init();
</script>
</body>
</html>
